<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Mortgage Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --secondary: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--secondary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .result-container {
            background-color: #eff6ff;
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            margin-top: 2rem;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
            color: var(--text);
        }

        .footer-note {
            font-size: 0.75rem;
            color: var(--secondary);
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>Mortgage Calculator</h1>
    
    <div class="input-group">
        <label for="loanAmount">Loan Amount ($)</label>
        <input type="number" id="loanAmount" value="100000" step="1000">
    </div>

    <div class="input-group">
        <label for="interestRate">Annual Interest Rate (%)</label>
        <input type="number" id="interestRate" value="6.00" step="0.01">
    </div>

    <div class="input-group">
        <label for="loanTerm">Term (Years)</label>
        <input type="number" id="loanTerm" value="30" step="1">
    </div>

    <div class="result-container">
        <div class="result-label">Monthly Payment</div>
        <div id="monthlyPayment" class="result-value">$599.55</div>
    </div>

    <p class="footer-note">Principal and Interest only.</p>
</div>

<script>
    const loanInput = document.getElementById('loanAmount');
    const rateInput = document.getElementById('interestRate');
    const termInput = document.getElementById('loanTerm');
    const display = document.getElementById('monthlyPayment');

    function calculateMortgage() {
        const principal = parseFloat(loanInput.value);
        const annualRate = parseFloat(rateInput.value) / 100;
        const years = parseFloat(termInput.value);

        if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || principal <= 0 || years <= 0) {
            display.textContent = "$0.00";
            return;
        }

        const monthlyRate = annualRate / 12;
        const numberOfPayments = years * 12;

        // Formula: M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1]
        let monthlyPayment;
        
        if (monthlyRate === 0) {
            monthlyPayment = principal / numberOfPayments;
        } else {
            monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments)) / 
                (Math.pow(1 + monthlyRate, numberOfPayments) - 1);
        }

        display.textContent = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
        }).format(monthlyPayment);
    }

    // Add event listeners for real-time updates
    [loanInput, rateInput, termInput].forEach(input => {
        input.addEventListener('input', calculateMortgage);
    });

    // Initial calculation
    calculateMortgage();
</script>

</body>
</html>
