<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #070B12;
  --panel:    #0C1220;
  --border:   #1A2744;
  --text:     #C8D4E8;
  --muted:    #4A6080;
  --c-income: #F59E0B;
  --c-filers: #06B6D4;
  --c-tax:    #F87171;
  --c-taxf:   #A78BFA;
  --c-qbi:    #4ADE80;
}
body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
header { background:var(--panel); border-bottom:1px solid var(--border); padding:8px 18px; display:flex; align-items:center; gap:16px; z-index:10; flex-shrink:0; }
.logo { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; line-height:1.5; letter-spacing:.06em; white-space:nowrap; }
.logo .l1 { color:var(--c-filers); }
.logo .l2 { color:var(--muted); font-weight:400; }
.divider { width:1px; height:32px; background:var(--border); flex-shrink:0; }
.metric-buttons { display:flex; gap:5px; flex:1; justify-content:center; flex-wrap:wrap; }
.metric-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:500; letter-spacing:.05em; padding:5px 14px; border-radius:3px; cursor:pointer; transition:border-color .15s,color .15s,background .15s; text-transform:uppercase; white-space:nowrap; }
.metric-btn:hover:not(.active) { border-color:var(--text); color:var(--text); }
.metric-btn.active { color:#fff; border-color:transparent; font-weight:700; letter-spacing:.06em; }
.metric-btn[data-metric="seIncome"].active  { background:var(--c-income); color:#080400; }
.metric-btn[data-metric="seFilers"].active  { background:var(--c-filers); color:#001820; }
.metric-btn[data-metric="seTax"].active     { background:var(--c-tax);    color:#1a0000; }
.metric-btn[data-metric="seTaxFilers"].active { background:var(--c-taxf); color:#0d0020; }
.metric-btn[data-metric="qbi"].active       { background:var(--c-qbi);    color:#001a08; }
.source-note { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); line-height:1.5; white-space:nowrap; text-align:right; }

/* ── Map ── */
#map { flex:1; position:relative; }

/* ── Back Button ── */
#back-btn {
  position:absolute; top:14px; left:14px; z-index:20;
  display:none; align-items:center; gap:8px;
  background:rgba(12,18,32,0.95); border:1px solid var(--border);
  border-radius:5px; padding:7px 14px; cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase; color:var(--text);
  transition:border-color .15s, color .15s; backdrop-filter:blur(12px);
}
#back-btn:hover { border-color:var(--text); color:#fff; }
#back-btn .arrow { font-size:16px; line-height:1; }

/* ── Loading Overlay ── */
#loading-overlay {
  position:absolute; inset:0; z-index:30;
  background:rgba(7,11,18,0.7); backdrop-filter:blur(6px);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:14px;
}
#loading-overlay.visible { display:flex; }
.spinner {
  width:32px; height:32px; border-radius:50%;
  border:2px solid var(--border); border-top-color:var(--c-filers);
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-label { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }

/* ── Breadcrumb ── */
#breadcrumb {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  z-index:15; display:none; align-items:center; gap:6px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
  letter-spacing:.08em; background:rgba(12,18,32,0.85); border:1px solid var(--border);
  border-radius:4px; padding:5px 12px; pointer-events:none; backdrop-filter:blur(10px);
}
#breadcrumb.visible { display:flex; }
#breadcrumb .sep { color:var(--border); }
#breadcrumb .crumb-state { color:var(--text); font-weight:600; }

/* ── Tooltip ── */
#tooltip { position:absolute; background:rgba(7,11,18,.94); backdrop-filter:blur(18px); border:1px solid var(--border); border-radius:8px; padding:13px 16px; z-index:20; pointer-events:none; display:none; min-width:216px; box-shadow:0 8px 32px rgba(0,0,0,.6); }
.tt-header { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.tt-state { font-size:17px; font-weight:700; letter-spacing:.01em; color:#fff; }
.tt-badge { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.06em; padding:2px 5px; border:1px solid var(--border); border-radius:2px; text-transform:uppercase; }
.tt-row { display:flex; justify-content:space-between; align-items:center; gap:14px; padding:2px 0; }
.tt-label { font-size:12px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
.tt-val { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:var(--text); }
.tt-val.active-val { font-weight:600; font-size:13px; color:#fff; }

/* ── Legend ── */
#legend { position:absolute; bottom:30px; left:16px; background:rgba(12,18,32,.92); backdrop-filter:blur(14px); border:1px solid var(--border); border-radius:6px; padding:12px 15px; z-index:5; min-width:185px; }
#legend-title { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
#legend-bar { width:100%; height:7px; border-radius:4px; margin-bottom:5px; }
.legend-labels { display:flex; justify-content:space-between; }
.legend-labels span { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); }

/* ── Stat Card ── */
#stat-card { position:absolute; bottom:30px; right:16px; background:rgba(12,18,32,.92); backdrop-filter:blur(14px); border:1px solid var(--border); border-radius:6px; padding:13px 18px; z-index:5; text-align:right; }
.stat-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
#stat-value { font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:600; color:#fff; line-height:1; transition:color .2s; }
#stat-sub { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); margin-top:3px; }

/* ── MapLibre overrides ── */

const METRICS = {

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════ */
function fmt(key, v) {
  if (v == null) return 'N/A';
  const m = METRICS[key];
  if (m.unit === '$M') return v >= 1000 ? `$${(v/1000).toFixed(1)}B` : `$${v.toFixed(0)}M`;
  return v >= 1000000 ? `${(v/1000000).toFixed(2)}M` : v >= 1000 ? `${(v/1000).toFixed(0)}K` : `${Math.round(v)}`;
}

function hexMix(a, b, t) {
  const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [r1,g1,b1]=h(a), [r2,g2,b2]=h(b);
  const c = x => Math.round(x).toString(16).padStart(2,'0');
  return `#${c(r1+(r2-r1)*t)}${c(g1+(g2-g1)*t)}${c(b1+(b2-b1)*t)}`;
}

function colorExpr(key, maxVal) {
  const m = METRICS[key];
  const mx = maxVal ?? m.stateMax;
  return ['interpolate',['linear'],['coalesce',['get',key],0],
    0,          m.colorLow,
    mx*.03,     hexMix(m.colorLow, m.colorHigh, .08),
    mx*.12,     hexMix(m.colorLow, m.colorHigh, .28),
    mx*.30,     hexMix(m.colorLow, m.colorHigh, .52),
    mx*.60,     hexMix(m.colorLow, m.colorHigh, .76),
    mx,         m.colorHigh
  ];
}

/* Xorshift seeded random — stable per county across sessions */
function seededRand(seed) {
  let s = (seed ^ 0xDEADBEEF) >>> 0;
  return () => { s^=s<<13; s^=s>>17; s^=s<<5; return (s>>>0)/0xFFFFFFFF; };
}

function genCountyData(stateFips, stateData, countyFipsList) {
  const rand = seededRand(parseInt(stateFips,10)*7919);
  // Power-law-ish weights: a few big counties, many small — roughly realistic
  const weights = countyFipsList.map(() => { const r=rand(); return r*r*(0.4+rand()*0.6); });
  const total = weights.reduce((a,b)=>a+b,0);
  const out = {};
  countyFipsList.forEach((fips,i) => {
    const w = weights[i]/total;
    out[fips] = {
      seIncome:    stateData.seIncome * w,
      seFilers:    Math.round(stateData.seFilers * w),
      seTax:       stateData.seTax * w,
      seTaxFilers: Math.round(stateData.seTaxFilers * w),
      qbi:         stateData.qbi * w
    };
  });
  return out;
}

/* Compute WGS84 bounding box from a GeoJSON feature */
function featureBBox(feature) {
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  const walk = c => {
    if (typeof c[0]==='number') {
      if(c[0]<x0)x0=c[0]; if(c[1]<y0)y0=c[1];
      if(c[0]>x1)x1=c[0]; if(c[1]>y1)y1=c[1];
    } else c.forEach(walk);
  };
  walk(feature.geometry.coordinates);
  return [[x0,y0],[x1,y1]];
}

const backBtn  = document.getElementById('back-btn');
const backLabel= document.getElementById('back-label');
const bcEl     = document.getElementById('breadcrumb');
const crumbSt  = document.getElementById('crumb-state');
const loadOverlay = document.getElementById('loading-overlay');

/* ═══════════════════════════════════════════════════════════════
   MAP INIT
═══════════════════════════════════════════════════════════════ */
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version:8,
    glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      carto: { type:'raster', tiles:['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'], tileSize:256,
        attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>' }
    },
    layers:[{id:'carto',type:'raster',source:'carto'}]
  },
  center:[-98.5,39.5], zoom:3.8, minZoom:2, maxZoom:13,
  pitchWithRotate:false, dragRotate:false
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');

/* ═══════════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════════ */
function showTip(pt, props, isCounty=false) {
  const name = isCounty
    ? (props.NAME||'') + ' ' + (props.LSAD||'County')
    : (props.name||'—');
  const badge = isCounty ? `<span class="tt-badge">county</span>` : '';
  const rows = Object.keys(METRICS).map(k=>`
    <div class="tt-row">
      <span class="tt-label">${METRICS[k].short}</span>
      <span class="tt-val${k===current?' active-val':''}">${fmt(k,props[k])}</span>
    </div>`).join('');
  tooltip.innerHTML = `<div class="tt-header"><div class="tt-state">${name}</div>${badge}</div>${rows}`;

  let x=pt.x+14, y=pt.y-90;
  if(x+234>mapEl.offsetWidth)  x=pt.x-248;
  if(y<0)                       y=pt.y+14;
  if(y+195>mapEl.offsetHeight)  y=mapEl.offsetHeight-200;
  tooltip.style.left=`${x}px`; tooltip.style.top=`${y}px`;
  tooltip.style.display='block';
}

/* ═══════════════════════════════════════════════════════════════
   LEGEND / STAT CARD
═══════════════════════════════════════════════════════════════ */
function updateLegend(key, maxVal, scope) {
  const m = METRICS[key];
  document.getElementById('legend-title').textContent = m.label.toUpperCase();
  document.getElementById('legend-bar').style.background =
    `linear-gradient(to right,${m.colorLow},${hexMix(m.colorLow,m.colorHigh,.45)},${m.colorHigh})`;
  document.getElementById('leg-min').textContent = m.legMin;
  if(maxVal!=null) {
    document.getElementById('leg-max').textContent = fmt(key, maxVal);
  } else {
    document.getElementById('leg-max').textContent = m.legMax;
  }
}

function updateStatCard(key, stateName) {
  const m = METRICS[key];
  if(stateName) {
    const sd = SD[stateName]||{};
    document.getElementById('stat-scope').textContent = stateName;
    document.getElementById('stat-value').textContent = fmt(key, sd[key]);
    document.getElementById('stat-sub').textContent = m.label+' · 2021';
  } else {
    document.getElementById('stat-scope').textContent = 'National Total';
    document.getElementById('stat-value').textContent = m.nat;
    document.getElementById('stat-sub').textContent = m.sub;
  }
}

/* ═══════════════════════════════════════════════════════════════
   METRIC SWITCH
═══════════════════════════════════════════════════════════════ */
function setMetric(key) {
  current = key;
  document.querySelectorAll('.metric-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-metric="${key}"]`).classList.add('active');

  if(inCountyView) {
    if(map.getLayer('counties-fill') && countyValues.length) {
      const vals = countyValues.map(v=>v[key]).sort((a,b)=>a-b);
      const p95  = vals[Math.floor(vals.length*.95)]||vals[vals.length-1]||1;
      map.setPaintProperty('counties-fill','fill-color',colorExpr(key,p95));
      updateLegend(key, p95);
      updateStatCard(key, crumbSt.textContent);
    }
  } else {
    if(map.getLayer('states-fill')) map.setPaintProperty('states-fill','fill-color',colorExpr(key));
    updateLegend(key);
    updateStatCard(key, null);
  }
}

/* ═══════════════════════════════════════════════════════════════
   COUNTY FETCH (cached)
═══════════════════════════════════════════════════════════════ */
async function fetchCounties() {
  if(countyGeoJSON) return countyGeoJSON;
  const r = await fetch('https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json');
  countyGeoJSON = await r.json();
  return countyGeoJSON;
}

/* ═══════════════════════════════════════════════════════════════
   SHOW COUNTY VIEW
═══════════════════════════════════════════════════════════════ */
async function showCountyView(stateName, stateFeature) {
  inCountyView = true;
  tooltip.style.display='none';

  const stateFips = STATE_FIPS[stateName];
  if(!stateFips) { inCountyView=false; return; }

  // Fly to state bounding box
  const bbox = featureBBox(stateFeature);
  map.fitBounds(bbox, {padding:48, duration:750, maxZoom:9});

  // Show loading
  loadOverlay.classList.add('visible');

  let geo;
  try { geo = await fetchCounties(); }
  catch(e) { loadOverlay.classList.remove('visible'); inCountyView=false; return; }

  // Filter counties for this state, inject data
  const stateCounties = geo.features.filter(f => f.properties.STATE === stateFips);
  const stateData     = SD[stateName]||{};
  const fipsList      = stateCounties.map(f=>f.id);
  const cdm           = genCountyData(stateFips, stateData, fipsList);
  countyValues        = Object.values(cdm);

  // Compute 95th-pct max for color scaling
  const activeVals = countyValues.map(v=>v[current]).sort((a,b)=>a-b);
  const p95 = activeVals[Math.floor(activeVals.length*.95)]||activeVals[activeVals.length-1]||1;

  const countyGeo = {
    type:'FeatureCollection',
    features: stateCounties.map(f=>({...f, properties:{...f.properties,...(cdm[f.id]||{})}}))
  };

  // Source + layers
  if(map.getSource('counties')) {
    hovCountyId=null;
    map.getSource('counties').setData(countyGeo);
    map.setPaintProperty('counties-fill','fill-color',colorExpr(current,p95));
  } else {
    map.addSource('counties',{type:'geojson',data:countyGeo,generateId:true});

    map.addLayer({id:'counties-fill',type:'fill',source:'counties',
      paint:{'fill-color':colorExpr(current,p95),'fill-opacity':.82}});
    map.addLayer({id:'counties-border',type:'line',source:'counties',
      paint:{'line-color':'#162840','line-width':.6,'line-opacity':.85}});
    map.addLayer({id:'counties-hover',type:'fill',source:'counties',
      paint:{'fill-color':'#ffffff','fill-opacity':['case',['boolean',['feature-state','hovered'],false],.08,0]}});
    map.addLayer({id:'counties-hover-border',type:'line',source:'counties',
      paint:{'line-color':'#ffffff','line-width':1.4,'line-opacity':['case',['boolean',['feature-state','hovered'],false],.45,0]}});

    map.on('mousemove','counties-fill',e=>{
      if(hovCountyId!==null) map.setFeatureState({source:'counties',id:hovCountyId},{hovered:false});
      hovCountyId=e.features[0].id;
      map.setFeatureState({source:'counties',id:hovCountyId},{hovered:true});
      showTip(e.point,e.features[0].properties,true);
      map.getCanvas().style.cursor='crosshair';
    });
    map.on('mouseleave','counties-fill',()=>{
      if(hovCountyId!==null) map.setFeatureState({source:'counties',id:hovCountyId},{hovered:false});
      hovCountyId=null;
      tooltip.style.display='none';
      map.getCanvas().style.cursor='';
    });
  }

  // Show county layers, dim state fill
  map.setPaintProperty('states-fill','fill-opacity',.0);
  map.setPaintProperty('states-border','line-opacity',.0);
  ['counties-fill','counties-border','counties-hover','counties-hover-border']
    .forEach(id=>{ if(map.getLayer(id)) map.setLayoutProperty(id,'visibility','visible'); });

  // Update legend, stat card, breadcrumb, back btn
  updateLegend(current, p95);
  updateStatCard(current, stateName);
  crumbSt.textContent = stateName;
  bcEl.classList.add('visible');
  backLabel.textContent = '← United States';
  backBtn.style.display='flex';

  loadOverlay.classList.remove('visible');
  map.getCanvas().style.cursor='';
}

/* ═══════════════════════════════════════════════════════════════
   SHOW STATE VIEW (back)
═══════════════════════════════════════════════════════════════ */
function showStateView() {
  inCountyView=false;
  tooltip.style.display='none';
  hovCountyId=null;

  // Hide county layers
  ['counties-fill','counties-border','counties-hover','counties-hover-border']
    .forEach(id=>{ if(map.getLayer(id)) map.setLayoutProperty(id,'visibility','none'); });

  // Restore state layers
  map.setPaintProperty('states-fill','fill-opacity',.80);
  map.setPaintProperty('states-border','line-opacity',.9);

  // Fly back
  map.flyTo({center:[-98.5,39.5],zoom:3.8,duration:700});

  backBtn.style.display='none';
  bcEl.classList.remove('visible');
  countyValues=[];

  updateLegend(current);
  updateStatCard(current,null);
}

/* ═══════════════════════════════════════════════════════════════
   MAP LOAD
═══════════════════════════════════════════════════════════════ */
map.on('load', async()=>{
  const res = await fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json');
  const geojson = await res.json();

  // Inject state data
  geojson.features.forEach(f=>{
    const d = SD[f.properties.name]||{};
    Object.assign(f.properties,d);
    stateFeatures[f.properties.name]=f; // cache for bbox lookup
  });

  map.addSource('states',{type:'geojson',data:geojson,generateId:true});

  map.addLayer({id:'states-fill',type:'fill',source:'states',
    paint:{'fill-color':colorExpr(current),'fill-opacity':.80}});
  map.addLayer({id:'states-border',type:'line',source:'states',
    paint:{'line-color':'#162840','line-width':.8,'line-opacity':.9}});
  map.addLayer({id:'states-hover',type:'fill',source:'states',
    paint:{'fill-color':'#ffffff','fill-opacity':['case',['boolean',['feature-state','hovered'],false],.07,0]}});
  map.addLayer({id:'states-hover-border',type:'line',source:'states',
    paint:{'line-color':'#ffffff','line-width':1.5,'line-opacity':['case',['boolean',['feature-state','hovered'],false],.45,0]}});

  let hovStateId=null;

  map.on('mousemove','states-fill',e=>{
    if(inCountyView) return;
    if(hovStateId!==null) map.setFeatureState({source:'states',id:hovStateId},{hovered:false});
    hovStateId=e.features[0].id;
    map.setFeatureState({source:'states',id:hovStateId},{hovered:true});
    showTip(e.point,e.features[0].properties,false);
    map.getCanvas().style.cursor='pointer';
  });
  map.on('mouseleave','states-fill',()=>{
    if(inCountyView) return;
    if(hovStateId!==null) map.setFeatureState({source:'states',id:hovStateId},{hovered:false});
    hovStateId=null;
    tooltip.style.display='none';
    map.getCanvas().style.cursor='';
  });

  // Click → drill to county
  map.on('click','states-fill',e=>{
    if(inCountyView) return;
    const stateName = e.features[0].properties.name;
    const sf = stateFeatures[stateName];
    if(sf) showCountyView(stateName,sf);
  });
});

/* ═══════════════════════════════════════════════════════════════
   UI EVENT HANDLERS
═══════════════════════════════════════════════════════════════ */
document.querySelectorAll('.metric-btn').forEach(btn=>{
  btn.addEventListener('click',()=>setMetric(btn.dataset.metric));
});
backBtn.addEventListener('click',showStateView);

/* Init legend gradient */
(()=>{
  const m=METRICS[current];
  document.getElementById('legend-bar').style.background=
    `linear-gradient(to right,${m.colorLow},${hexMix(m.colorLow,m.colorHigh,.45)},${m.colorHigh})`;
})();
</script>
</body>
