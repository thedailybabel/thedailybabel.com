<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adaptive Density Maze</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --wall: #444;
            --player: #00ffcc;
            --goal: #ff3366;
            --path: #111;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', sans-serif; touch-action: none;
        }
        #ui {
            height: 60px; display: flex; align-items: center; 
            justify-content: space-between; width: 90%; color: white;
            z-index: 10;
        }
        #timer { font-family: monospace; font-size: 1.2rem; }
        
        #maze-wrapper {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100vw; padding: 15px; box-sizing: border-box;
        }
        canvas {
            border: 2px solid var(--wall);
            background: var(--path);
            touch-action: none;
            display: block;
        }
        button {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--player);
            padding: 6px 14px; border-radius: 15px; font-size: 12px; cursor: pointer;
        }
        #victory {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--player);
            padding: 25px; text-align: center; color: white; display: none; z-index: 100;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="timer">00:00.0</div>
        <button onclick="initGame()">Generate Maze</button>
    </div>

    <div id="maze-wrapper">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <div id="victory">
        <h2 style="color:var(--player); margin-top:0;">GOAL REACHED</h2>
        <p id="final-time"></p>
        <button onclick="initGame()">New Maze</button>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const timerElement = document.getElementById('timer');
        
        let cols, rows, cellSize, grid = [], player = {x:0, y:0}, goal = {x:0, y:0};
        let startTime, timerInterval, gameActive = false;

        function randomizeColors() {
            const hue = Math.floor(Math.random() * 360);
            const root = document.documentElement;
            root.style.setProperty('--bg', `hsl(${hue}, 40%, 5%)`);
            root.style.setProperty('--path', `hsl(${hue}, 30%, 10%)`);
            root.style.setProperty('--wall', `hsl(${hue}, 20%, 40%)`);
            root.style.setProperty('--player', `hsl(${(hue + 180) % 360}, 100%, 60%)`);
        }

        function initGame() {
            randomizeColors();
            
            // ADAPTIVE LOGIC: 
            // Target channel width is 26px (comfortable for fingers)
            const targetSize = 26; 
            const padding = 30;
            const availableW = window.innerWidth - padding;
            const availableH = (window.innerHeight - 100) - padding;

            cols = Math.floor(availableW / targetSize);
            // Re-calculate exact cell size to fill width perfectly
            cellSize = availableW / cols; 
            rows = Math.floor(availableH / cellSize);

            // DPI Scaling for sharp lines
            const dpr = window.devicePixelRatio || 1;
            canvas.width = (cols * cellSize) * dpr;
            canvas.height = (rows * cellSize) * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = (cols * cellSize) + 'px';
            canvas.style.height = (rows * cellSize) + 'px';
            
            generateMazeData();
            player = {x: 0, y: 0};
            goal = {x: cols - 1, y: rows - 1};
            gameActive = true;
            document.getElementById('victory').style.display = 'none';
            
            render();
            startTimer();
        }

        function generateMazeData() {
            grid = Array.from({ length: rows * cols }, (_, i) => ({
                r: Math.floor(i / cols), c: i % cols,
                walls: [true, true, true, true], visited: false
            }));

            let stack = [];
            let current = grid[0];
            current.visited = true;

            while (true) {
                let neighbors = getUnvisitedNeighbors(current);
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWalls(current, next);
                    next.visited = true;
                    stack.push(current);
                    current = next;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else break;
            }
        }

        function getUnvisitedNeighbors(cell) {
            const moves = [{r:-1, c:0}, {r:0, c:1}, {r:1, c:0}, {r:0, c:-1}];
            return moves.map(m => {
                const nr = cell.r + m.r, nc = cell.c + m.c;
                return (nr >= 0 && nr < rows && nc >= 0 && nc < cols) ? grid[nr * cols + nc] : null;
            }).filter(n => n && !n.visited);
        }

        function removeWalls(a, b) {
            if (a.c < b.c) { a.walls[1] = false; b.walls[3] = false; }
            else if (a.c > b.c) { a.walls[3] = false; b.walls[1] = false; }
            if (a.r < b.r) { a.walls[2] = false; b.walls[0] = false; }
            else if (a.r > b.r) { a.walls[0] = false; b.walls[2] = false; }
        }

        function render() {
            ctx.clearRect(0, 0, cols * cellSize, rows * cellSize);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--wall');
            ctx.lineWidth = 1.5;
            
            grid.forEach(cell => {
                const x = cell.c * cellSize, y = cell.r * cellSize;
                ctx.beginPath();
                if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
                if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
                if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
                if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
                ctx.stroke();
            });

            // Goal
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--goal');
            ctx.fillRect(goal.x * cellSize + cellSize*0.25, goal.y * cellSize + cellSize*0.25, cellSize*0.5, cellSize*0.5);
            
            // Cursor (Player)
            const pColor = getComputedStyle(document.documentElement).getPropertyValue('--player');
            ctx.fillStyle = pColor;
            ctx.shadowBlur = 8;
            ctx.shadowColor = pColor;
            ctx.beginPath();
            ctx.arc(player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2, cellSize*0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function handleInput(e) {
            if (!gameActive) return;
            const t = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor(((t.clientX - rect.left) / rect.width) * cols);
            const y = Math.floor(((t.clientY - rect.top) / rect.height) * rows);
            
            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                if (Math.abs(x - player.x) + Math.abs(y - player.y) === 1) {
                    const cur = grid[player.y * cols + player.x];
                    let blocked = false;
                    if (x > player.x && cur.walls[1]) blocked = true;
                    if (x < player.x && cur.walls[3]) blocked = true;
                    if (y > player.y && cur.walls[2]) blocked = true;
                    if (y < player.y && cur.walls[0]) blocked = true;
                    
                    if (!blocked) {
                        player.x = x; player.y = y;
                        render();
                        if (player.x === goal.x && player.y === goal.y) win();
                    }
                }
            }
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleInput(e); });

        window.addEventListener('keydown', e => {
            let dx = 0, dy = 0;
            if (e.key === "ArrowUp") dy = -1;
            if (e.key === "ArrowDown") dy = 1;
            if (e.key === "ArrowLeft") dx = -1;
            if (e.key === "ArrowRight") dx = 1;
            if (dx !== 0 || dy !== 0) {
                const nx = player.x + dx, ny = player.y + dy;
                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    const cur = grid[player.y * cols + player.x];
                    let blocked = (dx === 1 && cur.walls[1]) || (dx === -1 && cur.walls[3]) || 
                                  (dy === 1 && cur.walls[2]) || (dy === -1 && cur.walls[0]);
                    if (!blocked) { player.x = nx; player.y = ny; render(); if (nx === goal.x && ny === goal.y) win(); }
                }
            }
        });

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerElement.innerText = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
            }, 100);
        }

        function win() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('victory').style.display = 'block';
            document.getElementById('final-time').innerText = "Time: " + timerElement.innerText;
        }

        window.onload = initGame;
        window.onresize = initGame;
    </script>
</body>
</html>
