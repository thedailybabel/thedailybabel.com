<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Piano 13</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        .piano {
            display: flex;
            background: #333;
            padding: 10px 5px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        .key {
            width: 45px;
            height: 180px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #888;
            user-select: none;
            transition: background 0.1s;
        }

        .key:active, .key.active {
            background: #e0e0e0;
            height: 178px;
            margin-top: 2px;
        }

        /* Black keys styling */
        .key.black {
            width: 30px;
            height: 110px;
            background: #222;
            color: white;
            margin-left: -15px;
            margin-right: -15px;
            z-index: 2;
            border: none;
        }

        .key.black:active, .key.black.active {
            background: #444;
            height: 108px;
        }
    </style>
</head>
<body>

<div class="piano" id="piano">
    <div class="key" data-note="261.63">C</div>
    <div class="key black" data-note="277.18">C#</div>
    <div class="key" data-note="293.66">D</div>
    <div class="key black" data-note="311.13">D#</div>
    <div class="key" data-note="329.63">E</div>
    <div class="key" data-note="349.23">F</div>
    <div class="key black" data-note="369.99">F#</div>
    <div class="key" data-note="392.00">G</div>
    <div class="key black" data-note="415.30">G#</div>
    <div class="key" data-note="440.00">A</div>
    <div class="key black" data-note="466.16">A#</div>
    <div class="key" data-note="493.88">B</div>
    <div class="key" data-note="523.25">C</div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(frequency) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine'; // Clean, soft sound
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1);
    }

    document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('mousedown', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playNote(parseFloat(key.dataset.note));
        });

        // Touch support for mobile devices
        key.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playNote(parseFloat(key.dataset.note));
        });
    });
</script>

</body>
</html>
