<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chroma Sudoku - High Contrast</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --cell-bg: #ffffff;
            --text-fixed: #000000;
            --text-user: #0044ff;
            --border: #333333;
            --accent: #0044ff;
            --highlight: #e8f0fe;
            --error-bg: #fee2e2;
            --error-text: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: #1a1a1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .header { padding: 15px 0; text-align: center; width: 100%; }
        #timer { font-family: monospace; font-size: 1.5rem; margin: 5px 0; font-weight: bold; }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        select, button {
            background: white;
            color: #333;
            border: 2px solid #ccc;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 3px solid var(--border);
            width: 92vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            background-color: var(--border);
            gap: 1px;
        }

        .cell {
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 6vw, 1.8rem);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        /* 3x3 Grid Definition */
        .cell:nth-child(3n) { border-right: 2px solid var(--border); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--border); }

        .cell.selected { background: var(--highlight); outline: 3px solid var(--accent); z-index: 2; }
        
        /* Coloring Logic */
        .cell.fixed { color: var(--text-fixed); font-weight: 800; }
        .cell.user-entry { color: var(--text-user); }
        .cell.wrong { background-color: var(--error-bg); color: var(--error-text); }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 20px;
            width: 92vw;
            max-width: 450px;
        }

        .num-btn {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            background: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 0 #ccc;
        }

        .num-btn:active { transform: translateY(2px); box-shadow: none; background: #eee; }

        #victory-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sudoku</h1>
        <div id="timer">00:00</div>
        <div class="controls">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="expert">Expert</option>
            </select>
            <button onclick="newGame()">Reset</button>
        </div>
    </div>

    <div id="grid"></div>

    <div class="numpad">
        <div class="num-btn" onclick="inputNumber(1)">1</div>
        <div class="num-btn" onclick="inputNumber(2)">2</div>
        <div class="num-btn" onclick="inputNumber(3)">3</div>
        <div class="num-btn" onclick="inputNumber(4)">4</div>
        <div class="num-btn" onclick="inputNumber(5)">5</div>
        <div class="num-btn" onclick="inputNumber(6)">6</div>
        <div class="num-btn" onclick="inputNumber(7)">7</div>
        <div class="num-btn" onclick="inputNumber(8)">8</div>
        <div class="num-btn" onclick="inputNumber(9)">9</div>
        <div class="num-btn" onclick="inputNumber(0)" style="color: var(--error-text);">Del</div>
    </div>

    <div id="victory-modal">
        <h2 style="font-size: 2rem;">Well Done!</h2>
        <p id="final-time" style="font-size: 1.5rem;"></p>
        <button onclick="newGame()" style="padding: 15px 30px; font-size: 1.1rem; background: var(--accent); color: white; border: none;">Play Again</button>
    </div>

    <script>
        let board = [];
        let solution = [];
        let initialMask = []; // Tracks which cells were original
        let selectedCell = null;
        let startTime, timerInterval;

        const gridElement = document.getElementById('grid');
        const timerElement = document.getElementById('timer');

        function isValid(board, row, col, num) {
            for (let i = 0; i < 9; i++) {
                if (board[row][i] === num || board[i][col] === num) return false;
            }
            let startRow = Math.floor(row / 3) * 3;
            let startCol = Math.floor(col / 3) * 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[startRow + i][startCol + j] === num) return false;
                }
            }
            return true;
        }

        function solve(board) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) {
                        let nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                        for (let num of nums) {
                            if (isValid(board, row, col, num)) {
                                board[row][col] = num;
                                if (solve(board)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function generateBoard() {
            let base = Array.from({ length: 9 }, () => Array(9).fill(0));
            solve(base);
            solution = base.map(row => [...row]);
            
            let difficulty = document.getElementById('difficulty').value;
            let clues = { easy: 45, medium: 35, hard: 28, expert: 22 }[difficulty];
            
            board = base.map(row => [...row]);
            initialMask = Array.from({ length: 9 }, () => Array(9).fill(false));
            
            let toRemove = 81 - clues;
            while (toRemove > 0) {
                let r = Math.floor(Math.random() * 9);
                let c = Math.floor(Math.random() * 9);
                if (board[r][c] !== 0) {
                    board[r][c] = 0;
                    toRemove--;
                }
            }

            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if(board[r][c] !== 0) initialMask[r][c] = true;
                }
            }
            renderGrid();
        }

        function renderGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (initialMask[r][c]) {
                        cell.innerText = board[r][c];
                        cell.classList.add('fixed');
                    } else if (board[r][c] !== 0) {
                        cell.innerText = board[r][c];
                        cell.classList.add('user-entry');
                        if(board[r][c] !== solution[r][c]) cell.classList.add('wrong');
                    }
                    cell.onclick = () => selectCell(r, c, cell);
                    gridElement.appendChild(cell);
                }
            }
        }

        function selectCell(r, c, element) {
            document.querySelectorAll('.cell').forEach(el => el.classList.remove('selected'));
            if (initialMask[r][c]) {
                selectedCell = null;
                return;
            }
            selectedCell = { r, c, element };
            element.classList.add('selected');
        }

        function inputNumber(num) {
            if (!selectedCell) return;
            const { r, c } = selectedCell;
            
            if (num === 0) {
                board[r][c] = 0;
            } else {
                board[r][c] = num;
            }
            renderGrid();
            // Reselect the active cell visual
            const index = r * 9 + c;
            const newCell = gridElement.children[index];
            selectedCell.element = newCell;
            newCell.classList.add('selected');
            
            checkWin();
        }

        function checkWin() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] !== solution[r][c]) return;
                }
            }
            clearInterval(timerInterval);
            document.getElementById('final-time').innerText = "Total Time: " + timerElement.innerText;
            document.getElementById('victory-modal').style.display = 'flex';
        }

        function startTimer() {
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let sec = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(sec / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                timerElement.innerText = `${m}:${s}`;
            }, 1000);
        }

        function newGame() {
            document.getElementById('victory-modal').style.display = 'none';
            generateBoard();
            startTimer();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= 1 && e.key <= 9) inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') inputNumber(0);
        });

        newGame();
    </script>
</body>
</html>
