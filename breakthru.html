<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BREAKTHRU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff0080;
    --neon-yellow: #ffee00;
    --neon-green: #00ff88;
    --neon-purple: #bf00ff;
    --bg-dark: #020010;
    --bg-mid: #05001a;
    --panel: rgba(0,245,255,0.05);
    --glow-cyan: 0 0 10px #00f5ff, 0 0 30px #00f5ff55;
    --glow-pink: 0 0 10px #ff0080, 0 0 30px #ff008055;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg-dark);
    color: var(--neon-cyan);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0;
  }

  header {
    text-align: center;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(22px, 5vw, 42px);
    letter-spacing: 0.2em;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    line-height: 1;
  }

  h1 span { color: var(--neon-pink); text-shadow: var(--glow-pink); }

  .tagline {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(0,245,255,0.5);
    margin-top: 2px;
    text-transform: uppercase;
  }

  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 6px;
    align-items: center;
  }

  .hud-item {
    text-align: center;
  }

  .hud-label {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: rgba(0,245,255,0.5);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(16px, 3vw, 26px);
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px #ffee00, 0 0 20px #ffee0055;
    min-width: 80px;
    display: block;
  }

  .lives-display {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 2px;
  }

  .life-icon {
    width: 14px;
    height: 14px;
    background: var(--neon-pink);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 50% 80%, 18% 100%, 0% 38%);
    box-shadow: var(--glow-pink);
    transition: all 0.3s;
  }

  .life-icon.lost {
    background: rgba(255,0,128,0.15);
    box-shadow: none;
  }

  #canvas-wrap {
    position: relative;
    border: 1px solid rgba(0,245,255,0.3);
    box-shadow:
      0 0 20px rgba(0,245,255,0.2),
      inset 0 0 40px rgba(0,245,255,0.03);
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2,0,16,0.88);
    z-index: 20;
    gap: 12px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 5vw, 36px);
    letter-spacing: 0.15em;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    text-align: center;
  }

  .overlay-sub {
    font-size: clamp(9px, 2vw, 13px);
    letter-spacing: 0.2em;
    color: rgba(0,245,255,0.7);
    text-align: center;
  }

  .overlay-score {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px #ffee00;
  }

  #start-btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(12px, 2.5vw, 16px);
    letter-spacing: 0.2em;
    color: var(--bg-dark);
    background: var(--neon-cyan);
    border: none;
    padding: 12px 32px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    box-shadow: var(--glow-cyan);
    transition: all 0.2s;
    text-transform: uppercase;
    margin-top: 6px;
  }

  #start-btn:hover, #start-btn:active {
    background: var(--neon-pink);
    box-shadow: var(--glow-pink);
    transform: scale(1.05);
  }

  #controls-hint {
    margin-top: 4px;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(0,245,255,0.35);
    text-align: center;
  }

  #touch-controls {
    display: none;
    gap: 12px;
    margin-top: 6px;
  }

  .touch-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    color: var(--neon-cyan);
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.3);
    width: 64px;
    height: 48px;
    cursor: pointer;
    box-shadow: var(--glow-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  @media (pointer: coarse) {
    #touch-controls { display: flex; }
    #controls-hint { display: none; }
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: var(--glow-cyan); }
    50% { text-shadow: 0 0 20px #00f5ff, 0 0 60px #00f5ff, 0 0 100px #00f5ff55; }
  }

  .pulse { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>BREAK<span>THRU</span></h1>
    <div class="tagline">Retro Arcade · Neon Edition</div>
  </header>

  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <span class="hud-value" id="score-display">0</span>
    </div>
    <div class="hud-item">
      <div class="hud-label">Level</div>
      <span class="hud-value" id="level-display">1</span>
    </div>
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div class="lives-display" id="lives-display">
        <div class="life-icon"></div>
        <div class="life-icon"></div>
        <div class="life-icon"></div>
      </div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Best</div>
      <span class="hud-value" id="best-display">0</span>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="overlay-title pulse" id="overlay-title">BREAKTHRU</div>
      <div class="overlay-sub" id="overlay-sub">NEON ARCADE EDITION</div>
      <div class="overlay-score" id="overlay-score" style="display:none"></div>
      <button id="start-btn">INSERT COIN</button>
      <div id="controls-hint">← → ARROW KEYS or MOUSE · SPACE to launch</div>
    </div>
  </div>

  <div id="touch-controls">
    <button class="touch-btn" id="btn-left">◀</button>
    <button class="touch-btn" id="btn-launch" style="color:var(--neon-pink);border-color:var(--neon-pink);box-shadow:var(--glow-pink)">●</button>
    <button class="touch-btn" id="btn-right">▶</button>
  </div>
</div>

<script>
(function() {
  // ── Canvas Setup ──────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  const BASE_W = 480;
  const BASE_H = 580;
  let scale = 1;

  function resize() {
    const maxW = Math.min(window.innerWidth - 16, 520);
    const maxH = window.innerHeight - 200;
    scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1.4);
    canvas.width = BASE_W * scale;
    canvas.height = BASE_H * scale;
    ctx.scale(scale, scale);
  }
  resize();
  window.addEventListener('resize', () => { resize(); if (!gameRunning) drawIdle(); });

  // ── Audio ─────────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, type, duration, gain = 0.3, detune = 0) {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ac.currentTime);
      osc.detune.setValueAtTime(detune, ac.currentTime);
      g.gain.setValueAtTime(gain, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + duration);
    } catch(e) {}
  }

  function sfxBrick(row) {
    const freqs = [220, 260, 300, 350, 400, 450, 500, 550];
    playTone(freqs[row % freqs.length] * 1.5, 'square', 0.08, 0.2);
    playTone(freqs[row % freqs.length] * 3, 'sine', 0.06, 0.1, 20);
  }
  function sfxPaddle() { playTone(180, 'sine', 0.12, 0.25); }
  function sfxWall()   { playTone(140, 'triangle', 0.08, 0.2); }
  function sfxDie()    {
    playTone(400, 'sawtooth', 0.08, 0.3);
    setTimeout(() => playTone(300, 'sawtooth', 0.08, 0.3), 100);
    setTimeout(() => playTone(200, 'sawtooth', 0.1, 0.3), 200);
    setTimeout(() => playTone(100, 'sawtooth', 0.15, 0.4), 340);
  }
  function sfxLevelUp() {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 'sine', 0.18, 0.35), i * 100));
  }
  function sfxGameOver() {
    [300,250,200,150,100].forEach((f,i) => setTimeout(() => playTone(f, 'sawtooth', 0.12, 0.35), i * 120));
  }
  function sfxWin() {
    [523,659,784,880,1047,1319].forEach((f,i) => setTimeout(() => playTone(f, 'sine', 0.22, 0.4), i * 90));
  }

  // ── Game State ────────────────────────────────────────────────
  const MAX_LIVES = 3;
  let score, bestScore, level, lives, gameRunning, gameOver, won;
  let paddle, ball, bricks, particles, launched;
  let keys = {};
  let touchLeft = false, touchRight = false, touchLaunch = false;

  // Brick config
  const BRICK_ROWS = 7;
  const BRICK_COLS = 10;
  const BRICK_W = 42;
  const BRICK_H = 14;
  const BRICK_PAD = 3;
  const BRICK_OFF_X = (BASE_W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
  const BRICK_OFF_Y = 60;

  // Colors per row
  const ROW_COLORS = [
    '#ff0080', // pink - 7pts
    '#bf00ff', // purple - 6pts
    '#0080ff', // blue - 5pts
    '#00f5ff', // cyan - 4pts
    '#00ff88', // green - 3pts
    '#ffee00', // yellow - 2pts
    '#ff8800', // orange - 1pt
  ];
  const ROW_PTS = [7, 6, 5, 4, 3, 2, 1];

  function initGame() {
    score = 0;
    level = 1;
    lives = MAX_LIVES;
    particles = [];
    won = false;
    initLevel();
    updateHUD();
  }

  function initLevel() {
    launched = false;
    const speed = 4 + (level - 1) * 0.6;

    paddle = {
      x: BASE_W / 2 - 36,
      y: BASE_H - 28,
      w: 72 - (level - 1) * 3,
      h: 10,
      speed: 7,
      color: '#00f5ff',
    };
    paddle.w = Math.max(42, paddle.w);

    ball = {
      x: paddle.x + paddle.w / 2,
      y: paddle.y - 9,
      r: 6,
      vx: speed * (Math.random() > 0.5 ? 1 : -1),
      vy: -speed,
      trail: [],
    };

    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        // Skip some bricks on higher levels for variety
        let skip = false;
        if (level >= 3 && Math.random() < 0.08) skip = true;
        if (level >= 5 && Math.random() < 0.05) skip = true;
        if (skip) continue;

        // Hard bricks on higher levels
        let hits = 1;
        if (level >= 2 && r <= 1 && Math.random() < 0.3) hits = 2;
        if (level >= 4 && r <= 2 && Math.random() < 0.3) hits = 3;

        bricks.push({
          x: BRICK_OFF_X + c * (BRICK_W + BRICK_PAD),
          y: BRICK_OFF_Y + r * (BRICK_H + BRICK_PAD),
          w: BRICK_W,
          h: BRICK_H,
          row: r,
          color: ROW_COLORS[r],
          pts: ROW_PTS[r] * level,
          hits,
          maxHits: hits,
          alive: true,
          flash: 0,
        });
      }
    }
  }

  // ── Particles ─────────────────────────────────────────────────
  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 2 + Math.random() * 3,
        color,
        life: 1,
        decay: 0.025 + Math.random() * 0.035,
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.08;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ── Drawing ───────────────────────────────────────────────────
  function drawBall() {
    // Trail
    ball.trail.forEach((t, i) => {
      const a = (i / ball.trail.length) * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,245,255,${a})`;
      ctx.fill();
    });

    // Glow
    const grd = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 2.5);
    grd.addColorStop(0, 'rgba(0,245,255,0.6)');
    grd.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawPaddle() {
    const { x, y, w, h } = paddle;
    // Glow
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 20;
    // Body
    const grd = ctx.createLinearGradient(x, y, x, y + h);
    grd.addColorStop(0, '#00f5ff');
    grd.addColorStop(1, '#0080ff');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.roundRect(x + 4, y + 2, w - 8, 3, 2);
    ctx.fill();
  }

  function drawBricks() {
    bricks.forEach(b => {
      if (!b.alive) return;
      const flash = b.flash > 0;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = flash ? 18 : 8;

      // Multi-hit bricks get a crack overlay
      const dmgRatio = 1 - (b.hits / b.maxHits);
      const alpha = flash ? 1 : (0.7 + 0.3 * (b.hits / b.maxHits));

      // Hex color to rgba
      ctx.globalAlpha = alpha;
      const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grd.addColorStop(0, b.color);
      grd.addColorStop(1, adjustColor(b.color, -40));
      ctx.fillStyle = flash ? '#ffffff' : grd;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 2);
      ctx.fill();

      // Damage lines on multi-hit
      if (dmgRatio > 0) {
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(b.x + b.w * 0.3, b.y);
        ctx.lineTo(b.x + b.w * 0.5, b.y + b.h);
        ctx.stroke();
        if (dmgRatio > 0.5) {
          ctx.beginPath();
          ctx.moveTo(b.x + b.w * 0.6, b.y);
          ctx.lineTo(b.x + b.w * 0.7, b.y + b.h);
          ctx.stroke();
        }
      }

      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      // Top shine
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.roundRect(b.x + 2, b.y + 1, b.w - 4, 3, 1);
      ctx.fill();

      if (b.flash > 0) b.flash--;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function adjustColor(hex, amount) {
    let r = parseInt(hex.slice(1,3),16) + amount;
    let g = parseInt(hex.slice(3,5),16) + amount;
    let b = parseInt(hex.slice(5,7),16) + amount;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return `rgb(${r},${g},${b})`;
  }

  function drawBackground() {
    ctx.fillStyle = '#020010';
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    // Side walls glow
    const wallGlow = ctx.createLinearGradient(0, 0, 8, 0);
    wallGlow.addColorStop(0, 'rgba(0,245,255,0.15)');
    wallGlow.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.fillStyle = wallGlow;
    ctx.fillRect(0, 0, 8, BASE_H);
    const wallGlow2 = ctx.createLinearGradient(BASE_W, 0, BASE_W - 8, 0);
    wallGlow2.addColorStop(0, 'rgba(0,245,255,0.15)');
    wallGlow2.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.fillStyle = wallGlow2;
    ctx.fillRect(BASE_W - 8, 0, 8, BASE_H);
    // Top wall
    const topGlow = ctx.createLinearGradient(0, 0, 0, 8);
    topGlow.addColorStop(0, 'rgba(0,245,255,0.15)');
    topGlow.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.fillStyle = topGlow;
    ctx.fillRect(0, 0, BASE_W, 8);
  }

  function drawLaunchHint() {
    if (!launched) {
      ctx.fillStyle = 'rgba(0,245,255,0.5)';
      ctx.font = '9px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('[ SPACE / TAP ● TO LAUNCH ]', BASE_W / 2, BASE_H - 8);
    }
  }

  function render() {
    drawBackground();
    drawBricks();
    drawParticles();
    drawPaddle();
    drawBall();
    drawLaunchHint();
  }

  function drawIdle() {
    drawBackground();
    // Draw some bricks decoratively
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        ctx.fillStyle = ROW_COLORS[r] + '44';
        ctx.shadowColor = ROW_COLORS[r];
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.roundRect(
          BRICK_OFF_X + c * (BRICK_W + BRICK_PAD),
          BRICK_OFF_Y + r * (BRICK_H + BRICK_PAD),
          BRICK_W, BRICK_H, 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  // ── Physics / Update ──────────────────────────────────────────
  function update() {
    if (!gameRunning) return;

    // Move paddle
    const moveLeft  = keys['ArrowLeft']  || keys['a'] || keys['A'] || touchLeft;
    const moveRight = keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight;

    if (moveLeft)  paddle.x = Math.max(0, paddle.x - paddle.speed);
    if (moveRight) paddle.x = Math.min(BASE_W - paddle.w, paddle.x + paddle.speed);

    // Launch
    if ((keys[' '] || keys['w'] || touchLaunch) && !launched) {
      launched = true;
      touchLaunch = false;
      keys[' '] = false;
    }

    if (!launched) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 1;
      return;
    }

    // Trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 8) ball.trail.shift();

    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall collisions
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); sfxWall(); }
    if (ball.x + ball.r > BASE_W) { ball.x = BASE_W - ball.r; ball.vx = -Math.abs(ball.vx); sfxWall(); }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); sfxWall(); }

    // Paddle collision
    if (
      ball.y + ball.r >= paddle.y &&
      ball.y - ball.r <= paddle.y + paddle.h &&
      ball.x >= paddle.x - 2 &&
      ball.x <= paddle.x + paddle.w + 2 &&
      ball.vy > 0
    ) {
      ball.y = paddle.y - ball.r;
      // Angle based on hit position
      const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const maxAngle = Math.PI / 3;
      const angle = hitPos * maxAngle;
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      ball.vx = speed * Math.sin(angle);
      ball.vy = -speed * Math.cos(angle);
      // Speed clamp
      const maxSpeed = 10 + level;
      const cur = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      if (cur > maxSpeed) { ball.vx *= maxSpeed / cur; ball.vy *= maxSpeed / cur; }
      sfxPaddle();
    }

    // Ball lost
    if (ball.y - ball.r > BASE_H) {
      lives--;
      sfxDie();
      updateHUD();
      spawnParticles(ball.x, BASE_H - 10, '#ff0080', 20);
      if (lives <= 0) {
        setTimeout(() => endGame(false), 300);
      } else {
        setTimeout(() => {
          launched = false;
          ball.trail = [];
          ball.x = paddle.x + paddle.w / 2;
          ball.y = paddle.y - ball.r - 1;
        }, 300);
      }
    }

    // Brick collisions
    let aliveBricks = 0;
    for (let i = 0; i < bricks.length; i++) {
      const b = bricks[i];
      if (!b.alive) continue;
      aliveBricks++;

      if (
        ball.x + ball.r > b.x &&
        ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y &&
        ball.y - ball.r < b.y + b.h
      ) {
        b.hits--;
        b.flash = 3;
        if (b.hits <= 0) {
          b.alive = false;
          score += b.pts;
          if (score > bestScore) bestScore = score;
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 12);
          aliveBricks--;
        }
        sfxBrick(b.row);
        updateHUD();

        // Resolve bounce direction
        const overlapL = (ball.x + ball.r) - b.x;
        const overlapR = (b.x + b.w) - (ball.x - ball.r);
        const overlapT = (ball.y + ball.r) - b.y;
        const overlapB = (b.y + b.h) - (ball.y - ball.r);
        const minH = Math.min(overlapL, overlapR);
        const minV = Math.min(overlapT, overlapB);
        if (minH < minV) ball.vx = -ball.vx;
        else ball.vy = -ball.vy;
        break;
      }
    }

    updateParticles();

    // Level complete
    if (aliveBricks === 0) {
      level++;
      sfxLevelUp();
      if (level > 5) {
        setTimeout(() => endGame(true), 500);
      } else {
        setTimeout(() => { initLevel(); updateHUD(); }, 600);
      }
    }
  }

  // ── HUD ───────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('score-display').textContent = score.toLocaleString();
    document.getElementById('level-display').textContent = level;
    document.getElementById('best-display').textContent = bestScore.toLocaleString();

    const livesEl = document.getElementById('lives-display');
    const icons = livesEl.querySelectorAll('.life-icon');
    icons.forEach((icon, i) => {
      icon.classList.toggle('lost', i >= lives);
    });
  }

  // ── Game Flow ─────────────────────────────────────────────────
  function startGame() {
    getAudio(); // unlock audio
    document.getElementById('overlay').classList.add('hidden');
    gameRunning = true;
    gameOver = false;
    initGame();
    loop();
  }

  function endGame(victory) {
    gameRunning = false;
    won = victory;
    if (victory) sfxWin(); else sfxGameOver();

    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = victory ? 'YOU WIN!' : 'GAME OVER';
    document.getElementById('overlay-sub').textContent = victory ? 'ALL LEVELS CLEARED' : 'BETTER LUCK NEXT TIME';
    const scoreEl = document.getElementById('overlay-score');
    scoreEl.textContent = score.toLocaleString();
    scoreEl.style.display = 'block';
    document.getElementById('start-btn').textContent = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
  }

  // ── Game Loop ─────────────────────────────────────────────────
  let lastTime = 0;
  function loop(ts = 0) {
    if (!gameRunning) return;
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ── Input ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ([' ','ArrowLeft','ArrowRight','ArrowUp'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // Mouse / touch on canvas
  let mouseActive = false;
  canvas.addEventListener('mousemove', e => {
    if (!gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / scale;
    paddle.x = Math.max(0, Math.min(BASE_W - paddle.w, mx - paddle.w / 2));
  });

  canvas.addEventListener('click', e => {
    if (!gameRunning) return;
    if (!launched) { launched = true; }
  });

  // Touch drag on canvas
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.touches[0].clientX - rect.left) / scale;
    paddle.x = Math.max(0, Math.min(BASE_W - paddle.w, mx - paddle.w / 2));
  }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameRunning) return;
    getAudio();
    if (!launched) launched = true;
  }, { passive: false });

  // Touch buttons
  function holdBtn(id, setter) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(evt => el.addEventListener(evt, e => { e.preventDefault(); getter(e); setter(true); }));
    ['touchend','mouseup','mouseleave'].forEach(evt => el.addEventListener(evt, e => { setter(false); }));
    function getter(e) { if (e.type.startsWith('touch')) getAudio(); }
  }
  holdBtn('btn-left', v => { touchLeft = v; });
  holdBtn('btn-right', v => { touchRight = v; });
  document.getElementById('btn-launch').addEventListener('touchstart', e => { e.preventDefault(); getAudio(); if (!launched) { launched = true; } });
  document.getElementById('btn-launch').addEventListener('mousedown', e => { e.preventDefault(); if (!launched) { launched = true; } });

  // Start button
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('start-btn').addEventListener('touchend', e => { e.preventDefault(); startGame(); });

  // ── Init ──────────────────────────────────────────────────────
  bestScore = parseInt(localStorage.getItem('breakthru_best') || '0');
  document.getElementById('best-display').textContent = bestScore.toLocaleString();
  drawIdle();

  // Save best score on update
  const origUpdate = updateHUD;
  window.updateHUD = function() {
    origUpdate();
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('breakthru_best', bestScore);
      document.getElementById('best-display').textContent = bestScore.toLocaleString();
    }
  };

  // roundRect polyfill for older browsers
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      r = Math.min(r, w/2, h/2);
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      this.closePath();
      return this;
    };
  }

})();
</script>
</body>
</html>
