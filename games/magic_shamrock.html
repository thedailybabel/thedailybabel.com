<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍀 Magic Shamrock Hunt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Patrick+Hand&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --bright-green: #00e676;
  }

  body {
    background: radial-gradient(ellipse at 50% 30%, #1b5e20 0%, #0a2e0a 60%, #051205 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Patrick Hand', cursive;
    touch-action: none;
    user-select: none;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,215,0,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 8%,  rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, rgba(255,215,0,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 5%,  rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(255,215,0,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 40%, rgba(255,215,0,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.72) 0%, transparent 100%);
  }
  #score-display {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(20px, 5vw, 32px);
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.6), 2px 2px 0 #000;
  }
  #title {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(14px, 3.5vw, 22px);
    color: var(--bright-green);
    text-shadow: 0 0 12px rgba(0,230,118,0.8), 2px 2px 0 #000;
    text-align: center;
  }
  #stats {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(11px, 2.5vw, 16px);
    color: #a5d6a7;
    text-align: right;
    text-shadow: 1px 1px 0 #000;
    line-height: 1.5;
  }
  .speed-indicator { font-size: 10px; color: rgba(165,214,167,0.5); }

  /* ── Progress bar ── */
  #progress-bar-container {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 8px;
    background: rgba(0,0,0,0.4);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00c853, #FFD700);
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,200,83,0.8);
  }

  /* ── Game area & shamrocks ── */
  #game-area { position: fixed; inset: 0; z-index: 10; }

  .shamrock {
    position: absolute;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    line-height: 1;
    cursor: pointer;
    will-change: left, top;
    transform-origin: center center;
    /* No CSS transition on transform — game loop owns it */
  }

  @keyframes spinOut {
    0%   { transform: rotate(0deg)   scale(1);   opacity: 1; }
    55%  { transform: rotate(200deg) scale(1.35);opacity: 1; }
    100% { transform: rotate(360deg) scale(0);   opacity: 0; }
  }
  .shamrock.dying {
    animation: spinOut 0.38s ease forwards;
    pointer-events: none;
  }

  /* ── Floating score popup ── */
  .popup {
    position: fixed;
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(18px, 4vw, 26px);
    pointer-events: none;
    z-index: 150;
    animation: floatUp 1s ease forwards;
    text-shadow: 2px 2px 0 #000;
    white-space: nowrap;
  }
  .popup.good { color: var(--gold); }
  .popup.bad  { color: #ef5350; }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0)     scale(1);   }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-65px) scale(1.3); }
  }

  /* ── Overlays ── */
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
    background: rgba(0,0,0,0.86);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.45s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(36px, 10vw, 76px);
    color: var(--gold);
    text-shadow: 0 0 28px rgba(255,215,0,0.8), 3px 3px 0 #000;
    text-align: center;
    margin-bottom: 16px;
    animation: pulse 1s ease infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
  .overlay p {
    font-size: clamp(14px, 3.5vw, 20px);
    color: #c8e6c9; text-align: center;
    max-width: 380px; margin-bottom: 8px;
    line-height: 1.5; padding: 0 20px;
  }
  .btn {
    margin-top: 24px; padding: 14px 40px;
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(18px, 4vw, 26px);
    color: #000;
    background: linear-gradient(135deg, var(--gold), #ff9800);
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,215,0,0.5), 0 2px 0 #000;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  .btn:hover  { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(255,215,0,0.6), 0 2px 0 #000; }
  .btn:active { transform: translateY(1px); }

  /* ── Confetti ── */
  .confetti {
    position: fixed; top: -12px; z-index: 190;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0)     rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  #hint {
    position: fixed; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.18);
    z-index: 5; pointer-events: none;
    letter-spacing: 1px; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="score-display">⭐ <span id="score-val">0</span></div>
  <div id="title">🍀 Magic Shamrock Hunt</div>
  <div id="stats">
    <div>☘️ <span id="count-3">30</span> &nbsp; 🍀 <span id="count-4">1</span></div>
    <div class="speed-indicator">Speed: <span id="speed-label">Slow</span></div>
  </div>
</div>

<div id="game-area"></div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="hint">Find & tap 🍀 four-leaf shamrocks to win!</div>

<!-- Start screen -->
<div class="overlay" id="start-screen">
  <h1>🍀 Magic<br>Shamrock<br>Hunt!</h1>
  <p>Tap the <strong style="color:#FFD700">🍀 four-leaf shamrocks</strong> for <strong style="color:#FFD700">+50 pts</strong>!</p>
  <p>Avoid the <strong style="color:#ef9a9a">☘️ three-leaf ones</strong> — they cost <strong style="color:#ef9a9a">25 pts</strong>!</p>
  <p style="font-size:13px;color:#81c784">Reach <strong style="color:#FFD700">2,000 points</strong> to win! 🏆</p>
  <button class="btn" onclick="startGame()">Let's Go! 🍀</button>
</div>

<!-- Win screen -->
<div class="overlay" id="win-screen" style="display:none">
  <h1>🏆 You Win! 🏆</h1>
  <p id="win-message"></p>
  <p>Final Score: <strong style="color:#FFD700" id="final-score">0</strong></p>
  <button class="btn" onclick="resetGame()">Play Again! 🍀</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  AUDIO — Web Audio API, no external files
// ═══════════════════════════════════════════════════════
let actx = null;

function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function playHappy() {
  const ctx = ensureAudio();
  [[523,0],[659,0.11],[784,0.22],[1047,0.33]].forEach(([freq, t]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'triangle'; o.frequency.value = freq;
    const at = ctx.currentTime + t;
    g.gain.setValueAtTime(0, at);
    g.gain.linearRampToValueAtTime(0.22, at + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, at + 0.28);
    o.start(at); o.stop(at + 0.32);
  });
}

function playWawa() {
  const ctx = ensureAudio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  const lfo = ctx.createOscillator(), lg = ctx.createGain();
  lfo.connect(lg); lg.connect(o.frequency);
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sawtooth'; o.frequency.value = 260;
  lfo.frequency.value = 4; lg.gain.value = 45;
  const at = ctx.currentTime;
  o.frequency.setValueAtTime(300, at);
  o.frequency.linearRampToValueAtTime(110, at + 0.65);
  g.gain.setValueAtTime(0.28, at);
  g.gain.linearRampToValueAtTime(0, at + 0.72);
  lfo.start(at); o.start(at);
  lfo.stop(at + 0.8); o.stop(at + 0.8);
}

function playTaDa() {
  const ctx = ensureAudio();
  [[261,0],[329,0.10],[392,0.20],[523,0.30],[659,0.36],[784,0.42],
   [1047,0.48],[523,0.58],[784,0.63],[1047,0.68]].forEach(([freq, t]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'triangle'; o.frequency.value = freq;
    const at = ctx.currentTime + t;
    g.gain.setValueAtTime(0, at);
    g.gain.linearRampToValueAtTime(0.28, at + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, at + 0.55);
    o.start(at); o.stop(at + 0.6);
  });
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let shamrocks = [];
let score = 0;
let running = false;
let animFrame = null;
let threeLeafClicked = 0;

const WIN_SCORE     = 2000;
const EGG_THRESHOLD = 100;
const SZ            = 56;   // shamrock element size in px

function speedFactor() { return Math.min(1 + score / 800, 5); }
function speedLabel() {
  const s = speedFactor();
  if (s < 1.5) return 'Slow';
  if (s < 2.5) return 'Medium';
  if (s < 3.5) return 'Fast';
  if (s < 4.5) return 'Turbo!';
  return '⚡ MAX';
}

// ═══════════════════════════════════════════════════════
//  SHAMROCK FACTORY
// ═══════════════════════════════════════════════════════
function randVel(speed) {
  const a = Math.random() * Math.PI * 2;
  let vx = Math.cos(a) * speed;
  let vy = Math.sin(a) * speed;
  // guarantee movement in both axes
  if (Math.abs(vx) < 0.3) vx = 0.3 * (Math.random() < 0.5 ? 1 : -1);
  if (Math.abs(vy) < 0.3) vy = 0.3 * (Math.random() < 0.5 ? 1 : -1);
  return { vx, vy };
}

function createShamrock(is4Leaf, spawnX, spawnY) {
  const el = document.createElement('div');
  el.className = 'shamrock';
  el.textContent = is4Leaf ? '🍀' : '☘️';

  const W = window.innerWidth, H = window.innerHeight;
  const maxX = W - SZ, maxY = H - SZ;
  const px = (spawnX !== undefined) ? Math.max(0, Math.min(spawnX, maxX)) : Math.random() * maxX;
  const py = (spawnY !== undefined) ? Math.max(52, Math.min(spawnY, maxY - 10))
                                    : Math.random() * (maxY - 62) + 56;

  el.style.left = px + 'px';
  el.style.top  = py + 'px';

  const { vx, vy } = randVel(1.2);
  const rotSpeed   = (Math.random() - 0.5) * 1.8;

  const obj = {
    el, x: px, y: py, vx, vy,
    is4Leaf,
    rot: Math.random() * 360,
    rotSpeed,
    dead: false   // flag prevents any possible double-fire
  };

  shamrocks.push(obj);

  // ── pointerdown fires once per physical tap or click ──
  // Using capture + stopImmediatePropagation kills any
  // subsequent synthetic 'click' the browser might queue.
  el.addEventListener('pointerdown', function handler(e) {
    e.preventDefault();
    e.stopImmediatePropagation();
    el.removeEventListener('pointerdown', handler, true);
    handleTap(obj);
  }, true);

  document.getElementById('game-area').appendChild(el);
  return obj;
}

// ═══════════════════════════════════════════════════════
//  TAP HANDLER — exactly one call per shamrock
// ═══════════════════════════════════════════════════════
function handleTap(obj) {
  if (!running || obj.dead) return;
  obj.dead = true;

  const idx = shamrocks.indexOf(obj);
  if (idx !== -1) shamrocks.splice(idx, 1);

  // Kick off die animation; remove from DOM after it ends
  obj.el.classList.add('dying');
  setTimeout(() => { if (obj.el.parentNode) obj.el.remove(); }, 420);

  const cx = obj.x + SZ / 2;
  const cy = obj.y + SZ / 2;

  if (obj.is4Leaf) {
    score += 50;
    playHappy();
    showPopup('+50 🍀', cx, cy, 'good');
    setTimeout(() => { createShamrock(true); createShamrock(true); }, 230);
  } else {
    score = Math.max(0, score - 25);
    playWawa();
    showPopup('-25 ☘️', cx, cy, 'bad');
    threeLeafClicked++;
    setTimeout(() => {
      createShamrock(false); createShamrock(false); createShamrock(false);
    }, 230);
    if (threeLeafClicked >= EGG_THRESHOLD) {
      triggerWin('Easter');
      return;
    }
  }

  updateHUD();
  if (score >= WIN_SCORE) triggerWin('Score');
}

// ═══════════════════════════════════════════════════════
//  HUD & POPUP
// ═══════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-val').textContent   = score;
  document.getElementById('count-3').textContent     = shamrocks.filter(s => !s.is4Leaf).length;
  document.getElementById('count-4').textContent     = shamrocks.filter(s =>  s.is4Leaf).length;
  document.getElementById('speed-label').textContent = speedLabel();
  document.getElementById('progress-bar').style.width =
    Math.min(score / WIN_SCORE * 100, 100) + '%';
}

function showPopup(text, x, y, cls) {
  const p = document.createElement('div');
  p.className = 'popup ' + cls;
  p.textContent = text;
  p.style.left = (x - 38) + 'px';
  p.style.top  = (y - 22) + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1100);
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════
function gameLoop() {
  if (!running) return;

  const W  = window.innerWidth;
  const H  = window.innerHeight;
  const sf = speedFactor();

  for (const s of shamrocks) {
    if (s.dead) continue;

    s.x   += s.vx * sf;
    s.y   += s.vy * sf;
    s.rot += s.rotSpeed * sf;

    if (s.x <= 0)          { s.x = 0;       s.vx =  Math.abs(s.vx); }
    if (s.x >= W - SZ)     { s.x = W - SZ;  s.vx = -Math.abs(s.vx); }
    if (s.y <= 50)         { s.y = 50;       s.vy =  Math.abs(s.vy); }
    if (s.y >= H - SZ - 8) { s.y = H-SZ-8;  s.vy = -Math.abs(s.vy); }

    // position via left/top; rotation via transform
    // (no CSS transition on transform — no interference)
    s.el.style.left      = s.x + 'px';
    s.el.style.top       = s.y + 'px';
    s.el.style.transform = 'rotate(' + s.rot + 'deg)';
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════
//  WIN / RESET
// ═══════════════════════════════════════════════════════
function triggerWin(reason) {
  running = false;
  cancelAnimationFrame(animFrame);
  playTaDa();
  spawnConfetti();

  document.getElementById('win-message').textContent =
    reason === 'Easter'
      ? '🥚 Secret Easter Egg Unlocked! You cleared 100 three-leaf clovers — a true Irish legend!'
      : '🍀 You will have good luck for the rest of the day!';
  document.getElementById('final-score').textContent = score;
  document.getElementById('win-screen').style.display = 'flex';
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('win-screen').style.display   = 'none';
  document.querySelectorAll('.confetti').forEach(c => c.remove());

  cancelAnimationFrame(animFrame);
  document.getElementById('game-area').innerHTML = '';
  shamrocks = [];
  score = 0;
  threeLeafClicked = 0;

  for (let i = 0; i < 30; i++) createShamrock(false);
  createShamrock(true);

  running = true;
  updateHUD();
  gameLoop();
}

function resetGame() { startGame(); }

// ═══════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════
function spawnConfetti() {
  const cols = ['#00e676','#69f0ae','#00c853','#b9f6ca','#1b5e20','#43a047','#a5d6a7','#FFD700','#fff9c4','#f9fbe7'];
  for (let i = 0; i < 120; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left             = Math.random() * 100 + 'vw';
    // Every ~6th piece is a tiny shamrock emoji for extra flair
    if (i % 6 === 0) {
      c.textContent        = Math.random() < 0.5 ? '🍀' : '☘️';
      c.style.fontSize     = (Math.random() * 14 + 14) + 'px';
      c.style.background   = 'transparent';
      c.style.width        = 'auto';
      c.style.height       = 'auto';
    } else {
      c.style.background   = cols[Math.floor(Math.random() * cols.length)];
      c.style.width        = (Math.random() * 10 + 5) + 'px';
      c.style.height       = (Math.random() * 10 + 5) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    }
    c.style.animationDuration= (Math.random() * 3 + 2.5) + 's';
    c.style.animationDelay   = (Math.random() * 1.8) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6500);
  }
}

// ═══════════════════════════════════════════════════════
//  iOS audio unlock on first user gesture
// ═══════════════════════════════════════════════════════
document.addEventListener('pointerdown', () => ensureAudio(), { once: true });
</script>
</body>
</html>
