<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Molecule Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07090f;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);
  --text:#e2e8f5;
  --dim:rgba(226,232,245,0.4);
  --accent:#4af0c4;
  --accent2:#f06060;
  --accent3:#f0c44a;
  --glow:rgba(74,240,196,0.18);
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;-webkit-tap-highlight-color:transparent;}

/* bg grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(74,240,196,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(74,240,196,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;width:100vw;}

/* ── header ── */
header{
  padding:16px 24px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(7,9,15,0.9);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.logo{font-size:13px;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);font-weight:800;}
.logo span{color:var(--dim);font-weight:400;}

/* ── search bar ── */
#search-wrap{
  flex-shrink:0;
  padding:14px 20px;
  background:rgba(7,9,15,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.search-row{display:flex;gap:10px;align-items:stretch;}
#formula-input{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 16px;
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  min-width:0;
}
#formula-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
#formula-input::placeholder{color:rgba(226,232,245,0.2);}
#load-btn{
  padding:10px 20px;
  background:var(--accent);
  color:#07090f;
  border:none;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;
  transition:opacity 0.15s,transform 0.1s;
  white-space:nowrap;
  flex-shrink:0;
}
#load-btn:hover{opacity:0.85;}
#load-btn:active{transform:scale(0.96);}

.presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.preset-btn{
  padding:4px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--dim);
  cursor:pointer;
  transition:all 0.15s;
}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── canvas area ── */
#canvas-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
  touch-action:none;
}
canvas{display:block;width:100%;height:100%;}

/* ── info panel ── */
#info{
  position:absolute;
  bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(7,9,15,0.88);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 20px;
  text-align:center;
  backdrop-filter:blur(12px);
  pointer-events:none;
  min-width:220px;
  max-width:90vw;
  transition:opacity 0.3s;
}
#mol-name{font-size:15px;font-weight:800;letter-spacing:0.04em;margin-bottom:2px;color:var(--text);}
#mol-formula{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);}
#mol-stats{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:0.06em;}

/* ── status overlay ── */
#status{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  pointer-events:none;
  transition:opacity 0.4s;
}
#status.hidden{opacity:0;}
.status-icon{font-size:48px;line-height:1;}
#status-text{font-size:14px;color:var(--dim);letter-spacing:0.08em;text-align:center;max-width:260px;}
.spinner{width:36px;height:36px;border:2px solid rgba(74,240,196,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── hint bar ── */
#hint{
  flex-shrink:0;
  padding:6px 20px;
  background:rgba(7,9,15,0.85);
  border-top:1px solid var(--border);
  font-size:10px;color:var(--dim);
  display:flex;gap:16px;align-items:center;justify-content:center;
  letter-spacing:0.06em;
  flex-wrap:wrap;
}
#hint kbd{
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text);
}

/* error flash */
#error-flash{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(240,96,96,0.15);border:1px solid var(--accent2);
  border-radius:8px;padding:8px 18px;
  font-size:12px;color:var(--accent2);
  opacity:0;transition:opacity 0.3s;pointer-events:none;
  white-space:nowrap;
}
#error-flash.show{opacity:1;}

/* legend */
#legend{
  position:absolute;top:12px;right:14px;
  background:rgba(7,9,15,0.82);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  font-size:10px;color:var(--dim);
  display:none;flex-direction:column;gap:5px;
  backdrop-filter:blur(8px);
  max-height:60vh;overflow-y:auto;
}
#legend.show{display:flex;}
.leg-row{display:flex;align-items:center;gap:8px;}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Molecule <span>Explorer</span></div>
    <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;">3D Ball &amp; Stick</div>
  </header>

  <div id="search-wrap">
    <div class="search-row">
      <input id="formula-input" type="text" placeholder="Enter name or formula… e.g. caffeine, C6H12O6" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button id="load-btn">Explore</button>
    </div>
    <div class="presets">
      <button class="preset-btn" data-q="water">H₂O</button>
      <button class="preset-btn" data-q="ethanol">Ethanol</button>
      <button class="preset-btn" data-q="caffeine">Caffeine</button>
      <button class="preset-btn" data-q="aspirin">Aspirin</button>
      <button class="preset-btn" data-q="glucose">Glucose</button>
      <button class="preset-btn" data-q="ATP">ATP</button>
      <button class="preset-btn" data-q="dopamine">Dopamine</button>
      <button class="preset-btn" data-q="cholesterol">Cholesterol</button>
      <button class="preset-btn" data-q="acetic acid">CH₃COOH</button>
      <button class="preset-btn" data-q="sucrose">Sucrose</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="mol-canvas"></canvas>

    <div id="status">
      <div class="status-icon">⚗️</div>
      <div id="status-text">Enter a compound name or formula above to see its 3D structure</div>
    </div>

    <div id="info" style="opacity:0">
      <div id="mol-name">—</div>
      <div id="mol-formula">—</div>
      <div id="mol-stats">—</div>
    </div>

    <div id="legend"></div>
    <div id="error-flash"></div>
  </div>

  <div id="hint">
    <span>← → <kbd>Arrow Keys</kbd> or <kbd>Swipe</kbd> to rotate</span>
    <span>↑↓ tilt</span>
    <span><kbd>Scroll</kbd> or <kbd>Pinch</kbd> to zoom</span>
    <span><kbd>Drag</kbd> to spin freely</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  MOLECULE EXPLORER
//  Fetches 3D structure from PubChem, renders with
//  a hand-rolled 3D canvas engine (painter's algorithm)
// ════════════════════════════════════════════════════

const canvas = document.getElementById('mol-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

// ── CPK colours & radii ──────────────────────────────
const ELEMENT = {
  H:  { color:'#ffffff', r:0.31, label:'Hydrogen'  },
  C:  { color:'#aaaaaa', r:0.77, label:'Carbon'    },
  N:  { color:'#4466ff', r:0.75, label:'Nitrogen'  },
  O:  { color:'#ff4444', r:0.73, label:'Oxygen'    },
  F:  { color:'#44dd88', r:0.64, label:'Fluorine'  },
  P:  { color:'#ff8800', r:1.06, label:'Phosphorus'},
  S:  { color:'#dddd00', r:1.02, label:'Sulfur'    },
  Cl: { color:'#33cc33', r:0.99, label:'Chlorine'  },
  Br: { color:'#882200', r:1.14, label:'Bromine'   },
  I:  { color:'#550077', r:1.33, label:'Iodine'    },
  Na: { color:'#aa88ff', r:1.86, label:'Sodium'    },
  K:  { color:'#8866ff', r:2.27, label:'Potassium' },
  Ca: { color:'#ddddcc', r:1.97, label:'Calcium'   },
  Mg: { color:'#44bb44', r:1.60, label:'Magnesium' },
  Fe: { color:'#cc6600', r:1.56, label:'Iron'      },
  Zn: { color:'#4499bb', r:1.22, label:'Zinc'      },
  Cu: { color:'#cc7722', r:1.28, label:'Copper'    },
  default: { color:'#cc88cc', r:1.0, label:'Unknown' }
};

// ── State ────────────────────────────────────────────
let atoms = [], bonds = [];
let rotX = 0.35, rotY = 0.0;
let zoom = 1.0;
let autoRotSpeed = 0.008;
let autoRot = true;
let animId = null;
let molName = '', molFormula = '', molWeight = '';

// ── Matrix helpers ────────────────────────────────────
function rotateXY(pts, rx, ry) {
  const cx = Math.cos(rx), sx = Math.sin(rx);
  const cy = Math.cos(ry), sy = Math.sin(ry);
  return pts.map(([x,y,z]) => {
    // rotate around Y
    let x2 = x*cy + z*sy, z2 = -x*sy + z*cy;
    // rotate around X
    let y2 = y*cx - z2*sx, z3 = y*sx + z2*cx;
    return [x2, y2, z3];
  });
}

// ── Projection ───────────────────────────────────────
function project(x, y, z, W, H, fov, scale) {
  const d = fov / (fov + z);
  return [W/2 + x * d * scale, H/2 - y * d * scale, d];
}

// ── Resize ───────────────────────────────────────────
function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', () => { resize(); if (atoms.length) render(); });
resize();

// ── Render ───────────────────────────────────────────
function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (!atoms.length) return;

  const fov = 600;
  const baseScale = Math.min(W, H) * 0.5 * zoom;

  // rotate all atom positions
  const rawPts = atoms.map(a => [a.x, a.y, a.z]);
  const rotated = rotateXY(rawPts, rotX, rotY);

  // compute projected positions
  const projected = rotated.map(([x,y,z]) => project(x, y, z, W, H, fov, baseScale));

  // build draw list: bonds first, then atoms (painter's algorithm by z)
  const drawList = [];

  // bonds
  bonds.forEach(b => {
    const i = b[0], j = b[1];
    const [x1,y1,z1] = rotated[i];
    const [x2,y2,z2] = rotated[j];
    const zm = (z1+z2)/2;
    drawList.push({ type:'bond', i, j, zm });
  });

  // atoms
  atoms.forEach((a, i) => {
    const [,,z] = rotated[i];
    drawList.push({ type:'atom', i, zm: z });
  });

  // sort back-to-front
  drawList.sort((a,b) => a.zm - b.zm);

  drawList.forEach(item => {
    if (item.type === 'bond') {
      const i=item.i, j=item.j;
      const [px1,py1,d1] = projected[i];
      const [px2,py2,d2] = projected[j];
      const avgD = (d1+d2)/2;
      const w = Math.max(1.5, avgD * baseScale * 0.04);
      ctx.beginPath();
      ctx.moveTo(px1,py1);
      ctx.lineTo(px2,py2);
      ctx.strokeStyle = 'rgba(200,210,230,0.45)';
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.stroke();
    } else {
      const a = atoms[item.i];
      const el = ELEMENT[a.element] || ELEMENT.default;
      const [px,py,d] = projected[item.i];
      const sr = el.r * 18 * d * zoom;

      // sphere with radial gradient (shading)
      const ox = sr * 0.3, oy = sr * 0.3;
      const grad = ctx.createRadialGradient(px-ox, py-oy, sr*0.05, px, py, sr);
      const c = el.color;
      grad.addColorStop(0, lighten(c, 0.7));
      grad.addColorStop(0.4, lighten(c, 0.15));
      grad.addColorStop(1, darken(c, 0.4));

      ctx.beginPath();
      ctx.arc(px, py, sr, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();

      // rim
      ctx.strokeStyle = darken(c, 0.5);
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // label for non-H atoms (when large enough)
      if (a.element !== 'H' && sr > 8) {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.max(8, sr*0.72)|0}px Syne,sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(a.element, px, py);
      }
    }
  });
}

function lighten(hex, amt) { return shiftColor(hex, amt); }
function darken(hex, amt)  { return shiftColor(hex, -amt); }
function shiftColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,(r+255*amt)|0));
  g=Math.min(255,Math.max(0,(g+255*amt)|0));
  b=Math.min(255,Math.max(0,(b+255*amt)|0));
  return `rgb(${r},${g},${b})`;
}

// ── Auto-rotation loop ───────────────────────────────
function startLoop() {
  if (animId) cancelAnimationFrame(animId);
  function loop() {
    if (autoRot && atoms.length) rotY += autoRotSpeed;
    render();
    animId = requestAnimationFrame(loop);
  }
  loop();
}
startLoop();

// ── PubChem fetch ────────────────────────────────────
async function loadMolecule(query) {
  setStatus('loading');
  try {
    // 1. resolve CID from name or formula
    const cidUrl = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/cids/JSON`;
    const cidRes = await fetch(cidUrl);
    if (!cidRes.ok) throw new Error('Compound not found');
    const cidData = await cidRes.json();
    const cid = cidData.IdentifierList?.CID?.[0];
    if (!cid) throw new Error('Compound not found');

    // 2. fetch 3D conformer
    const sdfUrl = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF?record_type=3d`;
    const sdfRes = await fetch(sdfUrl);
    let sdfText = sdfRes.ok ? await sdfRes.text() : null;

    // 3. fallback to 2D if no 3D
    if (!sdfText || sdfText.includes('PUGREST.NotFound')) {
      const sdf2Url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF`;
      const sdf2Res = await fetch(sdf2Url);
      sdfText = sdf2Res.ok ? await sdf2Res.text() : null;
    }
    if (!sdfText) throw new Error('3D structure unavailable');

    // 4. fetch display name & properties
    const propUrl = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/property/IUPACName,MolecularFormula,MolecularWeight/JSON`;
    const propRes = await fetch(propUrl);
    const propData = propRes.ok ? await propRes.json() : null;
    const props = propData?.PropertyTable?.Properties?.[0] || {};

    parseSDF(sdfText);
    molName    = props.IUPACName || query;
    molFormula = props.MolecularFormula || '';
    molWeight  = props.MolecularWeight ? props.MolecularWeight + ' g/mol' : '';

    // capitalise name nicely
    molName = molName.replace(/\b\w/g, c => c.toUpperCase()).slice(0,40);

    updateInfo();
    buildLegend();
    autoRot = true;
    setStatus('hidden');
  } catch(e) {
    showError(e.message || 'Could not load compound');
    setStatus('idle');
  }
}

// ── SDF parser ───────────────────────────────────────
function parseSDF(text) {
  const lines = text.split('\n');
  // counts line is line 4 (index 3)
  const counts = lines[3];
  if (!counts) return;
  const nAtoms = parseInt(counts.substring(0,3));
  const nBonds = parseInt(counts.substring(3,6));

  atoms = []; bonds = [];
  for (let i=0; i<nAtoms; i++) {
    const l = lines[4+i];
    if (!l) continue;
    const x = parseFloat(l.substring(0,10));
    const y = parseFloat(l.substring(10,20));
    const z = parseFloat(l.substring(20,30));
    const el = l.substring(31,34).trim();
    atoms.push({ x, y, z, element: el });
  }
  for (let i=0; i<nBonds; i++) {
    const l = lines[4+nAtoms+i];
    if (!l) continue;
    const a1 = parseInt(l.substring(0,3)) - 1;
    const a2 = parseInt(l.substring(3,6)) - 1;
    if (a1>=0 && a2>=0 && a1<atoms.length && a2<atoms.length)
      bonds.push([a1, a2]);
  }

  // center & normalise
  let cx=0,cy=0,cz=0;
  atoms.forEach(a=>{cx+=a.x;cy+=a.y;cz+=a.z;});
  cx/=atoms.length; cy/=atoms.length; cz/=atoms.length;
  let maxD=0;
  atoms.forEach(a=>{
    a.x-=cx; a.y-=cy; a.z-=cz;
    maxD=Math.max(maxD,Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z));
  });
  const s = maxD>0 ? 1/maxD : 1;
  atoms.forEach(a=>{a.x*=s;a.y*=s;a.z*=s;});
  zoom = 0.9;
  rotX = 0.3; rotY = 0;
}

function updateInfo() {
  document.getElementById('mol-name').textContent    = molName;
  document.getElementById('mol-formula').textContent = molFormula;
  document.getElementById('mol-stats').textContent   =
    `${atoms.length} atoms · ${bonds.length} bonds · ${molWeight}`;
  document.getElementById('info').style.opacity = '1';
}

function buildLegend() {
  const seen = {};
  atoms.forEach(a => { seen[a.element] = (ELEMENT[a.element] || ELEMENT.default).color; });
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  Object.entries(seen).forEach(([el, col]) => {
    const el2 = ELEMENT[el] || ELEMENT.default;
    const row = document.createElement('div');
    row.className = 'leg-row';
    row.innerHTML = `<div class="leg-dot" style="background:${col}"></div><span>${el} <span style="opacity:0.5">${el2.label}</span></span>`;
    leg.appendChild(row);
  });
  leg.classList.add('show');
}

// ── UI helpers ───────────────────────────────────────
function setStatus(state) {
  const el = document.getElementById('status');
  const text = document.getElementById('status-text');
  if (state === 'loading') {
    el.classList.remove('hidden');
    el.innerHTML = '<div class="spinner"></div><div id="status-text">Fetching 3D structure…</div>';
    document.getElementById('info').style.opacity = '0';
    document.getElementById('legend').classList.remove('show');
    atoms=[]; bonds=[];
  } else if (state === 'hidden') {
    el.classList.add('hidden');
  } else {
    el.classList.remove('hidden');
    el.innerHTML = '<div class="status-icon">⚗️</div><div id="status-text">Enter a compound name or formula above</div>';
  }
}

let errTimer;
function showError(msg) {
  const el = document.getElementById('error-flash');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
  clearTimeout(errTimer);
  errTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Input ────────────────────────────────────────────
function doLoad() {
  const val = document.getElementById('formula-input').value.trim();
  if (!val) return;
  loadMolecule(val);
}
document.getElementById('load-btn').addEventListener('click', doLoad);
document.getElementById('formula-input').addEventListener('keydown', e => { if(e.key==='Enter') doLoad(); });
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('formula-input').value = btn.dataset.q;
    loadMolecule(btn.dataset.q);
  });
});

// ── Mouse drag ───────────────────────────────────────
let dragX=null, dragY=null, dragging=false;
canvas.addEventListener('mousedown', e => { dragging=true; dragX=e.clientX; dragY=e.clientY; autoRot=false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - dragX) * 0.008;
  rotX += (e.clientY - dragY) * 0.008;
  dragX=e.clientX; dragY=e.clientY;
});
window.addEventListener('mouseup', () => { dragging=false; });

// ── Touch ────────────────────────────────────────────
let touchX=null, touchY=null, pinchD=null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length===1) {
    touchX=e.touches[0].clientX; touchY=e.touches[0].clientY;
    autoRot=false;
  } else if (e.touches.length===2) {
    pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length===1 && touchX!==null) {
    const dx=e.touches[0].clientX-touchX, dy=e.touches[0].clientY-touchY;
    rotY += dx*0.008; rotX += dy*0.008;
    touchX=e.touches[0].clientX; touchY=e.touches[0].clientY;
  } else if (e.touches.length===2 && pinchD!==null) {
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    zoom *= d/pinchD; zoom=Math.max(0.2,Math.min(zoom,5));
    pinchD=d;
  }
}, {passive:false});

canvas.addEventListener('touchend', e => { e.preventDefault(); touchX=touchY=pinchD=null; }, {passive:false});

// ── Scroll to zoom ────────────────────────────────────
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY < 0 ? 1.1 : 0.91;
  zoom = Math.max(0.2, Math.min(zoom, 5));
}, {passive:false});

// ── Keyboard ─────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (!atoms.length) return;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    autoRot = false;
  }
  switch(e.key) {
    case 'ArrowLeft':  rotY -= 0.08; break;
    case 'ArrowRight': rotY += 0.08; break;
    case 'ArrowUp':    rotX -= 0.08; break;
    case 'ArrowDown':  rotX += 0.08; break;
    case '+': case '=': zoom = Math.min(zoom*1.15, 5); break;
    case '-':           zoom = Math.max(zoom*0.87, 0.2); break;
    case ' ':           autoRot = !autoRot; break;
  }
});

// ── Start with caffeine ──────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('formula-input').value = 'caffeine';
  loadMolecule('caffeine');
});
</script>
</body>
