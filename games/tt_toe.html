<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe: Man vs. Machine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        h1 { color: #333; margin-bottom: 10px; }

        #status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: #333;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 4px;
        }

        .cell:hover { background-color: #e9ecef; }
        .cell.taken { cursor: not-allowed; }
        .cell.x { color: #007bff; }
        .cell.o { color: #dc3545; }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    <div id="status">Your turn (X)</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button onclick="resetGame()">Reset Game</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        // Sound Effects (Base64)
        const winSound = new Audio("data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQYAAACAgICAgICAgICA"); // Mock "Ta-Da" beep
        const loseSound = new Audio("data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQYAAACAgP/A/8CAgICA"); // Mock "Sad" beep

        // Note: Replacing generic beeps with more distinct synthetic sounds for the browser
        function playWin() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25, context.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, context.currentTime + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, context.currentTime + 0.2); // G5
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);
            osc.start();
            osc.stop(context.currentTime + 0.5);
        }

        function playLose() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, context.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.linearRampToValueAtTime(0, context.currentTime + 0.5);
            osc.start();
            osc.stop(context.currentTime + 0.5);
        }

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const index = parseInt(clickedCell.getAttribute('data-index'));

            if (board[index] !== "" || !gameActive) return;

            makeMove(index, "X");

            if (gameActive) {
                statusElement.innerText = "Computer is thinking...";
                setTimeout(computerMove, 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase(), 'taken');
            checkResult();
        }

        function computerMove() {
            if (!gameActive) return;
            
            // Simple AI: Pick a random empty spot
            let availableCells = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
            if (availableCells.length > 0) {
                const randomIndex = availableCells[Math.floor(Math.random() * availableCells.length)];
                makeMove(randomIndex, "O");
                if (gameActive) statusElement.innerText = "Your turn (X)";
            }
        }

        function checkResult() {
            let roundWon = false;
            let winner = "";

            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winner = board[a];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                if (winner === "X") {
                    statusElement.innerText = "You Win! 🎉";
                    playWin();
                } else {
                    statusElement.innerText = "Computer Wins! 🤖";
                    playLose();
                }
                return;
            }

            if (!board.includes("")) {
                statusElement.innerText = "It's a Draw! 😐";
                gameActive = false;
                playLose(); // Drawing is not winning, so play the mocking sound
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusElement.innerText = "Your turn (X)";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'taken');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
