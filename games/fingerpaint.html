<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FingerPaint</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --panel-border: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --shadow: rgba(0,0,0,0.5);
    --toolbar-h: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: var(--toolbar-h);
    background: var(--panel);
    border-bottom: 2px solid var(--panel-border);
    flex-shrink: 0;
    gap: 10px;
    z-index: 10;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    background: linear-gradient(135deg, #ff6b9d, #ffd93d, #6bceff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── COLOR PALETTE ── */
  .palette-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
    padding: 4px 0;
  }
  .palette-wrap::-webkit-scrollbar { display: none; }

  .swatch {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform .15s, border-color .15s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active {
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  /* custom color picker trigger */
  .swatch-custom {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    color: #fff;
    text-shadow: 0 1px 3px #000;
  }

  #customColorInput { display: none; }

  /* ── TOOLBAR BUTTONS ── */
  .tools {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-border);
    border: none;
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    gap: 5px;
    padding: 7px 12px;
    transition: background .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { background: #1e4080; }
  .btn:active { transform: scale(.95); }
  .btn svg { flex-shrink: 0; }

  .btn-danger { background: #6b1e2e; }
  .btn-danger:hover { background: var(--accent); }

  .btn-share { background: #1a5e3a; }
  .btn-share:hover { background: #27ae60; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    background: #fff;
  }

  /* ── SIZE INDICATOR ── */
  #cursor-ring {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width .08s, height .08s;
    display: none;
    z-index: 100;
  }

  /* ── SHARE MODAL ── */
  #shareModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #shareModal.open { display: flex; }

  .modal-box {
    background: var(--panel);
    border: 2px solid var(--panel-border);
    border-radius: 18px;
    padding: 28px 24px;
    width: min(340px, 90vw);
    text-align: center;
  }
  .modal-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    margin-bottom: 18px;
    color: #ffd93d;
  }
  .share-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .share-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    transition: transform .12s, opacity .12s;
  }
  .share-btn:hover { transform: scale(1.05); }
  .share-btn:active { opacity: .7; }
  .share-btn span { font-size: 1.7rem; }
  .sb-email   { background: #c0392b; color: #fff; }
  .sb-sms     { background: #27ae60; color: #fff; }
  .sb-native  { background: #2980b9; color: #fff; }
  .sb-copy    { background: #8e44ad; color: #fff; }

  .btn-close-modal {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    border-radius: 8px;
    padding: 6px 18px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #fff;
    padding: 10px 20px;
    border-radius: 40px;
    font-size: .85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 300;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="logo">👆 FingerPaint</div>

  <div class="palette-wrap" id="palette">
    <!-- swatches injected by JS -->
  </div>

  <div class="tools">
    <button class="btn" id="undoBtn" title="Undo last stroke">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
      </svg>
      Undo
    </button>
    <button class="btn btn-danger" id="clearBtn" title="Clear canvas">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
      Clear
    </button>
    <button class="btn btn-share" id="shareBtn" title="Share your artwork">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      Share
    </button>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="cursor-ring"></div>

<!-- Share Modal -->
<div id="shareModal">
  <div class="modal-box">
    <h2>Share Your Art 🎨</h2>
    <div class="share-options">
      <button class="share-btn sb-email" id="shareEmail">
        <span>📧</span>Email
      </button>
      <button class="share-btn sb-sms" id="shareSMS">
        <span>💬</span>SMS / iMessage
      </button>
      <button class="share-btn sb-native" id="shareNative">
        <span>📤</span>Share…
      </button>
      <button class="share-btn sb-copy" id="shareCopy">
        <span>📋</span>Copy Image
      </button>
    </div>
    <button class="btn-close-modal" id="closeModal">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<input type="color" id="customColorInput" value="#ff00ff">

<script>
(() => {
  // ── PALETTE COLORS ──
  const COLORS = [
    '#000000','#ffffff','#f5f5f5','#888888',
    '#e74c3c','#ff6b6b','#e67e22','#f39c12',
    '#f1c40f','#ffd93d','#2ecc71','#27ae60',
    '#1abc9c','#16a085','#3498db','#2980b9',
    '#9b59b6','#8e44ad','#e91e63','#ff4081',
    '#795548','#ff5722','#607d8b','#34495e',
  ];

  let activeColor = COLORS[0];
  let strokes = [];       // each stroke = array of {x,y,r} + color
  let currentStroke = null;
  let lastPoint = null;
  let lastTime = null;
  let holdTimer = null;
  let holdRadius = 4;
  let isHolding = false;

  // ── BUILD PALETTE ──
  const paletteEl = document.getElementById('palette');

  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === activeColor ? ' active' : '');
    s.style.background = c;
    if (c === '#ffffff' || c === '#f5f5f5') s.style.outline = '1px solid #555';
    s.addEventListener('pointerdown', (e) => { e.stopPropagation(); setColor(c, s); });
    paletteEl.appendChild(s);
  });

  // Custom color swatch
  const customSwatch = document.createElement('div');
  customSwatch.className = 'swatch swatch-custom';
  customSwatch.title = 'Custom color';
  customSwatch.innerHTML = '+';
  customSwatch.addEventListener('pointerdown', (e) => { e.stopPropagation(); document.getElementById('customColorInput').click(); });
  paletteEl.appendChild(customSwatch);

  document.getElementById('customColorInput').addEventListener('input', (e) => {
    const c = e.target.value;
    customSwatch.style.background = `conic-gradient(${c}, yellow, ${c})`;
    setColor(c, customSwatch);
  });

  function setColor(c, swatchEl) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    swatchEl.classList.add('active');
    activeColor = c;
  }

  // ── CANVAS SETUP ──
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if (w === 0 || h === 0) return;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    // ctx.scale must be called after every resize
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redrawAll();
  }

  // ── REDRAW ──
  function redrawAll() {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    strokes.forEach(stroke => renderStroke(stroke));
  }

  function renderStroke(stroke) {
    if (!stroke.points.length) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = stroke.color;
    ctx.fillStyle   = stroke.color;

    if (stroke.points.length === 1) {
      const p = stroke.points[0];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      for (let i = 0; i < stroke.points.length - 1; i++) {
        const a = stroke.points[i];
        const b = stroke.points[i + 1];
        const r = (a.r + b.r) / 2;
        ctx.lineWidth = r * 2;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        // fill circles at each endpoint for smoothness
        ctx.beginPath();
        ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      // cap the last point
      const last = stroke.points[stroke.points.length - 1];
      ctx.beginPath();
      ctx.arc(last.x, last.y, last.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── CURSOR RING ──
  const ring = document.getElementById('cursor-ring');
  function updateRing(x, y, r) {
    const size = Math.max(4, r) * 2 + 4;
    ring.style.display = 'block';
    ring.style.width  = size + 'px';
    ring.style.height = size + 'px';
    ring.style.left   = x + 'px';
    ring.style.top    = y + 'px';
    ring.style.borderColor = activeColor === '#ffffff' ? '#999' : activeColor;
  }
  function hideRing() { ring.style.display = 'none'; }

  // ── SPEED → RADIUS ──
  const MIN_R = 2, MAX_R = 40;

  // Convert average stroke speed (px/ms) to a brush radius.
  // Speed is measured over the whole stroke so width is consistent.
  // CAP: strokes faster than this are MIN_R. Below CAP, width scales up.
  // 2x slower timing: CAP = 0.15 px/ms (was 0.08 effectively)
  function speedToRadius(avgSpeed) {
    const CAP = 0.15;
    const v = Math.min(avgSpeed, CAP);
    const norm = 1 - (v / CAP);      // 0 = fast/thin, 1 = very slow/thick
    return MIN_R + norm * (MAX_R - MIN_R);
  }

  // ── POINTER EVENTS ──
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function startDraw(e) {
    if (e.target.closest('header') || e.target.closest('#shareModal')) return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    const pos = getPos(e);
    lastPoint = pos;
    lastTime  = Date.now();
    holdRadius = MIN_R;
    isHolding = true;

    // Don't push any points yet — wait until first move to avoid start blob.
    // We store the pending start pos and only commit when movement begins.
    currentStroke = {
      color: activeColor,
      points: [],          // empty until first move
      _startPos: pos,
      _startTime: Date.now(),
      _totalDist: 0,
      _holdDelayTimer: null
    };
    strokes.push(currentStroke);

    // Hold-to-grow: fires after 800ms of no movement (2x slower than before)
    currentStroke._holdDelayTimer = setTimeout(() => {
      holdTimer = setInterval(() => {
        if (!isHolding || !currentStroke) return;
        holdRadius = Math.min(holdRadius + 0.2, MAX_R);  // 2x slower grow (was 0.4)
        // Update the single held point
        if (currentStroke.points.length === 0) {
          // First render of a held dot — commit the start point now
          const sp = currentStroke._startPos;
          currentStroke.points.push({ x: sp.x, y: sp.y, r: holdRadius });
          redrawAll();
          updateRing(sp.x, sp.y, holdRadius);
        } else {
          const last = currentStroke.points[currentStroke.points.length - 1];
          last.r = holdRadius;
          redrawAll();
          updateRing(last.x, last.y, holdRadius);
        }
      }, 30);
    }, 800);  // 800ms grace before any hold-grow starts

    updateRing(pos.x, pos.y, holdRadius);
    // Do NOT render yet — no visible dot until movement or hold confirms intent
  }

  function moveDraw(e) {
    if (!currentStroke) {
      const pos = getPos(e);
      updateRing(pos.x, pos.y, holdRadius);
      return;
    }
    e.preventDefault();
    const pos = getPos(e);
    const now = Date.now();

    const dx = pos.x - lastPoint.x;
    const dy = pos.y - lastPoint.y;
    const segDist = Math.sqrt(dx * dx + dy * dy);

    // Ignore jitter — sub-pixel moves on touch can cause speed spikes
    if (segDist < 1) return;

    // Cancel hold timers the moment movement starts
    if (currentStroke._holdDelayTimer) {
      clearTimeout(currentStroke._holdDelayTimer);
      currentStroke._holdDelayTimer = null;
    }
    clearInterval(holdTimer);
    holdTimer = null;
    isHolding = false;

    // Accumulate total distance for whole-stroke average speed
    currentStroke._totalDist += segDist;
    const elapsed = Math.max(now - currentStroke._startTime, 1);
    const avgSpeed = currentStroke._totalDist / elapsed;
    const r = speedToRadius(avgSpeed);
    holdRadius = r;

    // If this is the first movement, commit the pending start point
    if (currentStroke.points.length === 0) {
      currentStroke.points.push({ x: currentStroke._startPos.x, y: currentStroke._startPos.y, r });
    } else {
      // Retroactively update ALL previous points to this same radius
      // so the whole stroke stays one consistent width
      for (const pt of currentStroke.points) { pt.r = r; }
    }
    currentStroke.points.push({ x: pos.x, y: pos.y, r });

    // Full redraw to keep consistent width across whole stroke
    redrawAll();

    updateRing(pos.x, pos.y, r);
    lastPoint = pos;
    lastTime  = now;
  }

  function endDraw(e) {
    if (currentStroke) {
      if (currentStroke._holdDelayTimer) {
        clearTimeout(currentStroke._holdDelayTimer);
      }
      // If no points were ever committed (quick tap with no movement), 
      // draw a minimal dot at the start position
      if (currentStroke.points.length === 0) {
        const sp = currentStroke._startPos;
        currentStroke.points.push({ x: sp.x, y: sp.y, r: MIN_R });
        redrawAll();
      }
    }
    clearInterval(holdTimer);
    holdTimer = null;
    isHolding = false;
    currentStroke = null;
    lastPoint = null;
    lastTime  = null;
  }

  // Pointer events cover mouse, touch, and stylus on all platforms — no need for separate touch listeners
  canvas.addEventListener('pointerdown', startDraw);
  canvas.addEventListener('pointermove', moveDraw);
  canvas.addEventListener('pointerup',   endDraw);
  canvas.addEventListener('pointercancel', endDraw);
  canvas.addEventListener('pointerleave', (e) => {
    if (e.pointerType === 'mouse') { hideRing(); endDraw(); }
  });

  // ── UNDO ──
  document.getElementById('undoBtn').addEventListener('click', () => {
    if (strokes.length === 0) { showToast('Nothing to undo!'); return; }
    strokes.pop();
    redrawAll();
    showToast('Stroke undone ↩');
  });

  // ── CLEAR ──
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (strokes.length === 0) { showToast('Canvas is already empty!'); return; }
    strokes = [];
    redrawAll();
    showToast('Canvas cleared 🗑️');
  });

  // ── SHARE ──
  const shareModal = document.getElementById('shareModal');
  document.getElementById('shareBtn').addEventListener('click', () => { shareModal.classList.add('open'); });
  document.getElementById('closeModal').addEventListener('click', () => { shareModal.classList.remove('open'); });
  shareModal.addEventListener('click', e => { if (e.target === shareModal) shareModal.classList.remove('open'); });

  function getBlob(cb) {
    canvas.toBlob(cb, 'image/png');
  }

  function getDataURL() { return canvas.toDataURL('image/png'); }

  // Email
  document.getElementById('shareEmail').addEventListener('click', () => {
    shareModal.classList.remove('open');
    const subject = encodeURIComponent('My FingerPaint artwork 🎨');
    const body    = encodeURIComponent('Check out my painting made with FingerPaint!\n\n(Attach the image manually if your mail client supports it)');
    // Attempt to attach via data URI (works in some clients)
    const dataURL = getDataURL();
    const mailto  = `mailto:?subject=${subject}&body=${body}`;
    // Download as fallback
    downloadImage('fingerpaint.png');
    window.location.href = mailto;
    showToast('Image saved — attach it in your email app 📧');
  });

  // SMS
  document.getElementById('shareSMS').addEventListener('click', () => {
    shareModal.classList.remove('open');
    downloadImage('fingerpaint.png');
    const smsURL = /iPhone|iPad|iPod/i.test(navigator.userAgent)
      ? 'sms:&body=Check%20out%20my%20FingerPaint%20artwork!'
      : 'sms:?body=Check%20out%20my%20FingerPaint%20artwork!';
    window.location.href = smsURL;
    showToast('Image saved — attach it in your SMS app 💬');
  });

  // Native share (Web Share API)
  document.getElementById('shareNative').addEventListener('click', () => {
    shareModal.classList.remove('open');
    if (navigator.share && navigator.canShare) {
      getBlob(async (blob) => {
        const file = new File([blob], 'fingerpaint.png', { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: 'FingerPaint', text: 'My FingerPaint artwork 🎨' });
          } catch (err) {
            if (err.name !== 'AbortError') showToast('Share cancelled.');
          }
        } else {
          // fall back to URL share
          try {
            await navigator.share({ title: 'FingerPaint', text: 'Check out my FingerPaint artwork!' });
          } catch {}
        }
      });
    } else {
      downloadImage('fingerpaint.png');
      showToast('Saved! Share the image from your downloads 📤');
    }
  });

  // Copy to clipboard
  document.getElementById('shareCopy').addEventListener('click', () => {
    shareModal.classList.remove('open');
    if (navigator.clipboard && window.ClipboardItem) {
      getBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('Image copied to clipboard 📋');
        } catch {
          downloadImage('fingerpaint.png');
          showToast('Saved to downloads (clipboard blocked) 💾');
        }
      });
    } else {
      downloadImage('fingerpaint.png');
      showToast('Image saved to downloads 💾');
    }
  });

  function downloadImage(filename) {
    const a = document.createElement('a');
    a.href = getDataURL();
    a.download = filename;
    a.click();
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ── RESIZE ──
  let resizeRAF;
  const ro = new ResizeObserver(() => {
    cancelAnimationFrame(resizeRAF);
    resizeRAF = requestAnimationFrame(resizeCanvas);
  });
  ro.observe(wrap);
  // Initial size — defer one frame so layout is complete
  requestAnimationFrame(resizeCanvas);

  // ── KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      document.getElementById('undoBtn').click();
    }
  });

})();
</script>
