<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tower of Babel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; }

  #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; touch-action: none; }

  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

  #height-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  #height-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: rgba(255,220,150,0.7);
    text-transform: uppercase;
  }
  #height-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 48px;
    font-weight: 700;
    color: #ffd787;
    text-shadow: 0 0 20px rgba(255,200,100,0.8), 0 0 40px rgba(255,180,50,0.4);
    line-height: 1;
    margin-top: 2px;
  }

  #era-display {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: rgba(255,220,150,0.5);
    text-align: center;
    pointer-events: none;
    transition: color 2s, text-shadow 2s;
  }

  #tap-hint {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(255,220,150,0.6);
    text-align: center;
    animation: breathe 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  #start-screen, #gameover-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    background: radial-gradient(ellipse at center, rgba(20,10,40,0.85) 0%, rgba(5,2,15,0.95) 100%);
    cursor: pointer;
  }
  #gameover-screen { display: none; }

  .screen-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 8vw, 56px);
    font-weight: 700;
    color: #ffd787;
    text-shadow: 0 0 30px rgba(255,200,80,0.9), 0 0 60px rgba(255,150,30,0.5);
    text-align: center;
    letter-spacing: 0.05em;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .screen-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 2.5vw, 14px);
    color: rgba(255,200,130,0.6);
    letter-spacing: 0.3em;
    text-align: center;
    margin-bottom: 40px;
  }
  .screen-body {
    font-family: 'Cinzel', serif;
    font-size: clamp(12px, 2.8vw, 15px);
    color: rgba(220,190,150,0.7);
    text-align: center;
    max-width: 320px;
    line-height: 1.8;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }
  .tap-to-play {
    font-family: 'Cinzel', serif;
    font-size: clamp(12px, 3vw, 15px);
    letter-spacing: 0.4em;
    color: rgba(255,220,150,0.8);
    animation: breathe 2s ease-in-out infinite;
  }

  #score-final {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(60px, 15vw, 90px);
    font-weight: 700;
    color: #ffd787;
    text-shadow: 0 0 40px rgba(255,200,80,1), 0 0 80px rgba(255,150,30,0.6);
    line-height: 1;
    margin: 10px 0;
  }

  #share-btn {
    pointer-events: all;
    margin-top: 20px;
    background: none;
    border: 1px solid rgba(255,200,100,0.4);
    color: rgba(255,200,100,0.7);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #share-btn:hover { border-color: rgba(255,200,100,0.9); color: rgba(255,200,100,1); background: rgba(255,200,100,0.05); }

  #highscores {
    margin-top: 24px;
    text-align: center;
  }
  .hs-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(255,180,80,0.4);
    margin-bottom: 8px;
  }
  .hs-entry {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(255,180,80,0.5);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  .ornament {
    font-size: 24px;
    margin: 8px 0;
    opacity: 0.5;
  }

  #flash-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px, 4vw, 20px);
    color: #ffd787;
    text-shadow: 0 0 20px rgba(255,200,80,1);
    letter-spacing: 0.2em;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="game-canvas"></canvas>

<div id="ui">
  <div id="height-display">
    <div id="height-label">Height</div>
    <div id="height-num">0</div>
  </div>
  <div id="era-display">— The Foundation —</div>
  <div id="tap-hint" style="display:none">TAP TO PLACE</div>

  <div id="start-screen">
    <div class="ornament">⚱</div>
    <div class="screen-title">Tower<br>of Babel</div>
    <div class="screen-sub">— A Monument to Hubris —</div>
    <div class="screen-body">
      The block swings.<br>
      You tap. It falls.<br>
      Build until the gods take notice.
    </div>
    <div class="tap-to-play">TAP TO BEGIN</div>
  </div>

  <div id="gameover-screen">
    <div class="ornament">⚱</div>
    <div class="screen-title">The Gods<br>Were Not<br>Amused</div>
    <div class="screen-sub">— YOUR TOWER REACHED —</div>
    <div id="score-final">0</div>
    <div class="screen-sub">BLOCKS HIGH</div>
    <button id="share-btn">SHARE YOUR HUBRIS</button>
    <div id="highscores">
      <div class="hs-label">— HALL OF MONUMENTS —</div>
      <div id="hs-list" class="hs-entry"></div>
    </div>
    <br>
    <div class="tap-to-play" style="margin-top:16px">TAP TO REBUILD</div>
  </div>

  <div id="flash-msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  THREE.JS BACKGROUND — purely cosmetic
// ═══════════════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: bgCanvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const bgCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
bgCamera.position.set(0, 80, 220);
bgCamera.lookAt(0, 40, 0);

// Sky colors per era
const eras = [
  { name: '— The Foundation —', sky1: 0x1a0a05, sky2: 0x8b3a1a, fog: 0x6b2a0a, fogNear: 300, fogFar: 800 },
  { name: '— Stones of Earth —', sky1: 0x0d1a2e, sky2: 0x1e4a8a, fog: 0x1e4a8a, fogNear: 400, fogFar: 1000 },
  { name: '— Marble and Gold —', sky1: 0x3d1a4a, sky2: 0xc76b3a, fog: 0x8b3a5a, fogNear: 400, fogFar: 1000 },
  { name: '— Above the Clouds —', sky1: 0x05081a, sky2: 0x1a103a, fog: 0x0d0820, fogNear: 600, fogFar: 2000 },
  { name: '— Among the Stars —', sky1: 0x010208, sky2: 0x040510, fog: 0x020310, fogNear: 800, fogFar: 3000 },
  { name: '— The Heavens Open —', sky1: 0x000005, sky2: 0x000205, fog: 0x000108, fogNear: 1000, fogFar: 5000 },
];

// Simplex-like noise (simple hash-based)
function hash(x, y) {
  let n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}
function smoothNoise(x, y) {
  let ix = Math.floor(x), iy = Math.floor(y);
  let fx = x - ix, fy = y - iy;
  let ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  let a = hash(ix, iy), b = hash(ix+1, iy);
  let c = hash(ix, iy+1), d = hash(ix+1, iy+1);
  return a + (b-a)*ux + (c-a)*uy + (d-a)*ux*uy;
}
function fbm(x, y, octaves=5) {
  let v = 0, amp = 0.5, freq = 1, max = 0;
  for (let i=0;i<octaves;i++) { v += smoothNoise(x*freq, y*freq)*amp; max+=amp; amp*=0.5; freq*=2; }
  return v / max;
}

// Terrain
const terrainSize = 1200;
const terrainSegs = 80;
const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegs, terrainSegs);
terrainGeo.rotateX(-Math.PI / 2);
const posArr = terrainGeo.attributes.position.array;
for (let i = 0; i < posArr.length; i += 3) {
  const x = posArr[i] / terrainSize;
  const z = posArr[i+2] / terrainSize;
  const d = Math.sqrt(x*x + z*z);
  const height = fbm(x*3+10, z*3+10) * 60 - 5;
  posArr[i+1] = d < 0.05 ? -2 : height * (1 - Math.exp(-d*8));
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true });
const colors = [];
for (let i = 0; i < posArr.length; i += 3) {
  const h = posArr[i+1];
  if (h < 1) { colors.push(0.2, 0.35, 0.6); }
  else if (h < 8) { colors.push(0.25, 0.45, 0.2); }
  else if (h < 25) { colors.push(0.35, 0.3, 0.2); }
  else { colors.push(0.7, 0.72, 0.75); }
}
terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.position.y = -5;
scene.add(terrain);

// Trees (instanced)
const treeGeo = new THREE.ConeGeometry(2, 8, 5);
const treeMat = new THREE.MeshLambertMaterial({ color: 0x2d5a27 });
const treeCount = 200;
const treeMesh = new THREE.InstancedMesh(treeGeo, treeMat, treeCount);
const dummy = new THREE.Object3D();
let ti = 0;
for (let attempt = 0; attempt < 2000 && ti < treeCount; attempt++) {
  const tx = (Math.random() - 0.5) * 900;
  const tz = (Math.random() - 0.5) * 900;
  const d = Math.sqrt(tx*tx + tz*tz);
  if (d < 60) continue;
  const nx = tx / terrainSize + 0.5;
  const nz = tz / terrainSize + 0.5;
  const th = fbm(nx*3+10, nz*3+10) * 60 - 5;
  if (th < 2 || th > 22) continue;
  dummy.position.set(tx, th + 3, tz);
  dummy.scale.setScalar(0.8 + Math.random() * 0.4);
  dummy.updateMatrix();
  treeMesh.setMatrixAt(ti++, dummy.matrix);
}
treeMesh.instanceMatrix.needsUpdate = true;
scene.add(treeMesh);

// Lighting
const sunLight = new THREE.DirectionalLight(0xffd0a0, 1.2);
sunLight.position.set(100, 200, 100);
scene.add(sunLight);
const ambLight = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambLight);

// Clouds (planes)
const cloudGroup = new THREE.Group();
scene.add(cloudGroup);
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
for (let i = 0; i < 30; i++) {
  const cGeo = new THREE.PlaneGeometry(80 + Math.random()*120, 20 + Math.random()*30);
  const cloud = new THREE.Mesh(cGeo, cloudMat.clone());
  cloud.position.set((Math.random()-0.5)*800, 120 + Math.random()*60, (Math.random()-0.5)*800);
  cloud.rotation.x = -Math.PI/2;
  cloud.rotation.z = Math.random() * Math.PI;
  cloudGroup.add(cloud);
}
cloudGroup.visible = false;

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 3000; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2000 + Math.random() * 1000;
  starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: true });
const stars = new THREE.Points(starGeo, starMat);
stars.visible = false;
scene.add(stars);

// Aurora (simple animated planes)
const auroraGroup = new THREE.Group();
scene.add(auroraGroup);
const auroraColors = [0x00ff88, 0x8800ff, 0x0088ff, 0xff0088];
for (let i = 0; i < 6; i++) {
  const aGeo = new THREE.PlaneGeometry(600, 200);
  const aMat = new THREE.MeshBasicMaterial({ color: auroraColors[i % 4], transparent: true, opacity: 0.07, side: THREE.DoubleSide });
  const aurora = new THREE.Mesh(aGeo, aMat);
  aurora.position.set((Math.random()-0.5)*400, 300 + i*80, (Math.random()-0.5)*400);
  aurora.rotation.y = (i / 6) * Math.PI;
  auroraGroup.add(aurora);
}
auroraGroup.visible = false;

// Background color update
function updateBgForHeight(blocks) {
  let eraIdx = 0;
  if (blocks >= 75) eraIdx = 5;
  else if (blocks >= 50) eraIdx = 4;
  else if (blocks >= 30) eraIdx = 3;
  else if (blocks >= 20) eraIdx = 2;
  else if (blocks >= 10) eraIdx = 1;

  const era = eras[eraIdx];
  scene.background = new THREE.Color(era.sky1);
  scene.fog = new THREE.Fog(era.fog, era.fogNear, era.fogFar);

  cloudGroup.visible = blocks >= 15 && blocks < 50;
  stars.visible = blocks >= 30;
  auroraGroup.visible = blocks >= 60;

  sunLight.color.setHex(blocks >= 30 ? 0x8866cc : blocks >= 20 ? 0xff8844 : 0xffd0a0);
  sunLight.intensity = blocks >= 50 ? 0.3 : 1.2;
  ambLight.color.setHex(blocks >= 50 ? 0x110022 : 0x334466);

  document.getElementById('era-display').textContent = era.name;

  return eraIdx;
}

// Camera target: rises with tower
let bgCameraTargetY = 80;
let bgCameraTargetZ = 220;

function animateBg(blocks, t) {
  // Camera rises with tower
  const targetY = 80 + blocks * 3;
  const targetZ = 220 + blocks * 0.5;
  bgCameraTargetY += (targetY - bgCameraTargetY) * 0.02;
  bgCameraTargetZ += (targetZ - bgCameraTargetZ) * 0.02;
  bgCamera.position.set(Math.sin(t*0.00015)*60, bgCameraTargetY, bgCameraTargetZ);
  bgCamera.lookAt(0, bgCameraTargetY * 0.3, 0);

  // Drift clouds
  cloudGroup.children.forEach((c, i) => {
    c.position.x += Math.sin(t*0.0002 + i) * 0.1;
    c.position.z += Math.cos(t*0.0002 + i*1.3) * 0.08;
  });

  // Shimmer aurora
  auroraGroup.children.forEach((a, i) => {
    a.material.opacity = 0.04 + Math.sin(t*0.001 + i*0.7) * 0.04;
    a.rotation.y += 0.0003;
  });

  renderer.render(scene, bgCamera);
}

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playThunk(blocks) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const freq = 80 + (blocks * 2);
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.5, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.type = 'sine';
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}
function playTransition() {
  try {
    const ctx = getAudio();
    [0, 4, 7, 12].forEach((semi, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const freq = 220 * Math.pow(2, semi/12);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.08);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.08 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.08 + 0.8);
      osc.start(ctx.currentTime + i*0.08);
      osc.stop(ctx.currentTime + i*0.08 + 0.8);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  2D GAME CANVAS — all game logic here
// ═══════════════════════════════════════════════════════════
const gc = document.getElementById('game-canvas');
const ctx2d = gc.getContext('2d');

function resizeCanvases() {
  gc.width = window.innerWidth;
  gc.height = window.innerHeight;
  renderer.setSize(window.innerWidth, window.innerHeight);
  bgCamera.aspect = window.innerWidth / window.innerHeight;
  bgCamera.updateProjectionMatrix();
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

// Block style definitions
const blockStyles = [
  { fill: '#8B7355', stroke: '#6B5335', name: 'stone', glow: null },
  { fill: '#D4C5B0', stroke: '#A09080', name: 'marble', glow: null },
  { fill: '#C8A840', stroke: '#907828', name: 'gold', glow: 'rgba(255,200,80,0.3)' },
  { fill: '#1a1a2e', stroke: '#3a3a5e', name: 'obsidian', glow: 'rgba(100,80,200,0.3)' },
  { fill: 'rgba(150,220,255,0.6)', stroke: 'rgba(200,240,255,0.9)', name: 'crystal', glow: 'rgba(150,220,255,0.5)' },
];

function getStyleForBlocks(n) {
  if (n >= 75) return 4;
  if (n >= 50) return 3;
  if (n >= 30) return 2;
  if (n >= 15) return 1;
  return 0;
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count=12) {
  for (let i=0;i<count;i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 1.5 + Math.random()*3;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1, life: 1, color, size: 2+Math.random()*3 });
  }
}

// Game state
let gameState = 'start'; // start | playing | gameover
let blocks = [];
let pendulum = null;
let score = 0;
let shakeT = 0;

const BLOCK_H = 22;
const INITIAL_W = 180;
const BASE_Y_OFFSET = 80; // from bottom
const BASE_SWING_W = 140;
const BASE_SWING_SPEED = 0.018;

function getBlockW() {
  return Math.max(20, INITIAL_W - score * 0.5);
}

function getPendulumSpeed() {
  return BASE_SWING_SPEED * (1 + Math.floor(score / 20) * 0.04);
}

function blockColor(idx) {
  const style = blockStyles[getStyleForBlocks(idx)];
  return style;
}

function startGame() {
  blocks = [];
  particles = [];
  score = 0;
  const cx = gc.width / 2;
  const baseY = gc.height - BASE_Y_OFFSET;
  // Place first block
  blocks.push({ x: cx - INITIAL_W/2, y: baseY - BLOCK_H, w: INITIAL_W, h: BLOCK_H });
  spawnNewPendulum();
  document.getElementById('height-num').textContent = '0';
  gameState = 'playing';
  document.getElementById('tap-hint').style.display = 'block';
  updateBgForHeight(0);
}

function spawnNewPendulum() {
  const cx = gc.width / 2;
  const topBlock = blocks[blocks.length-1];
  const py = topBlock.y - BLOCK_H;
  const sw = Math.min(BASE_SWING_W, gc.width * 0.45);
  const dir = Math.random() < 0.5 ? 1 : -1;
  pendulum = {
    cx: cx,
    y: py,
    w: topBlock.w,
    angle: Math.PI * 0.48 * dir,
    speed: getPendulumSpeed() * dir,
    swingW: sw,
    active: true
  };
}

function placePendulum() {
  if (!pendulum || !pendulum.active) return;
  pendulum.active = false;
  const topBlock = blocks[blocks.length-1];
  const px = pendulum.cx + Math.sin(pendulum.angle) * pendulum.swingW - pendulum.w/2;
  const overlapLeft = Math.max(px, topBlock.x);
  const overlapRight = Math.min(px + pendulum.w, topBlock.x + topBlock.w);
  const overlap = overlapRight - overlapLeft;

  if (overlap <= 2) {
    // Game over
    shakeT = 15;
    endGame();
    return;
  }

  // Trim & add
  const newBlock = { x: overlapLeft, y: pendulum.y, w: overlap, h: BLOCK_H };
  blocks.push(newBlock);
  score++;

  const styleIdx = getStyleForBlocks(score);
  const prevStyle = getStyleForBlocks(score - 1);
  const style = blockStyles[styleIdx];

  // Particles at block placement
  spawnParticles(overlapLeft + overlap/2, pendulum.y + BLOCK_H/2, style.stroke, styleIdx === 4 ? 20 : 10);

  if (styleIdx !== prevStyle) {
    playTransition();
    spawnParticles(overlapLeft + overlap/2, pendulum.y, style.fill, 30);
    showFlash(getEraMessage(styleIdx));
  } else {
    playThunk(score);
  }

  document.getElementById('height-num').textContent = score;
  updateBgForHeight(score);

  // Scroll blocks down if needed
  scrollBlocks();
  spawnNewPendulum();
}

function getEraMessage(idx) {
  const msgs = ['', '✦ MARBLE GODS WATCH ✦', '✦ GOLD AND GLORY ✦', '✦ OBSIDIAN THRONE ✦', '✦ THE HEAVENS TREMBLE ✦'];
  return msgs[idx] || '';
}

let flashTimeout = null;
function showFlash(msg) {
  if (!msg) return;
  const el = document.getElementById('flash-msg');
  el.textContent = msg;
  el.style.opacity = '1';
  if (flashTimeout) clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function scrollBlocks() {
  // Keep top of stack visible — scroll everything down if near top
  const topBlock = blocks[blocks.length-1];
  const minY = gc.height * 0.25;
  if (topBlock.y < minY) {
    const shift = minY - topBlock.y + 60;
    blocks.forEach(b => b.y += shift);
    if (pendulum) pendulum.y += shift;
  }
  // Remove blocks that fell off bottom
  blocks = blocks.filter(b => b.y < gc.height + 100);
}

function endGame() {
  gameState = 'gameover';
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('score-final').textContent = score;
  saveHighScore(score);
  renderHighScores();
  setTimeout(() => {
    document.getElementById('gameover-screen').style.display = 'flex';
  }, 800);
}

function saveHighScore(s) {
  let scores = JSON.parse(localStorage.getItem('babel_scores') || '[]');
  scores.push({ score: s, date: new Date().toLocaleDateString() });
  scores.sort((a,b) => b.score - a.score);
  scores = scores.slice(0, 3);
  localStorage.setItem('babel_scores', JSON.stringify(scores));
}

function renderHighScores() {
  const scores = JSON.parse(localStorage.getItem('babel_scores') || '[]');
  const el = document.getElementById('hs-list');
  if (scores.length === 0) { el.textContent = 'No monuments yet.'; return; }
  el.innerHTML = scores.map((s,i) => `${['I','II','III'][i]}. ${s.score} blocks — ${s.date}`).join('<br>');
}

// Draw a block with style
function drawBlock(b, styleIdx, isPlaced=true) {
  const style = blockStyles[styleIdx];
  const x = b.x, y = b.y, w = b.w, h = b.h;
  ctx2d.save();

  if (style.glow) {
    ctx2d.shadowColor = style.glow;
    ctx2d.shadowBlur = 15;
  }

  // Main face
  if (style.name === 'crystal') {
    const grad = ctx2d.createLinearGradient(x, y, x+w, y+h);
    grad.addColorStop(0, 'rgba(180,240,255,0.7)');
    grad.addColorStop(0.5, 'rgba(220,250,255,0.4)');
    grad.addColorStop(1, 'rgba(150,220,255,0.6)');
    ctx2d.fillStyle = grad;
  } else if (style.name === 'marble') {
    const grad = ctx2d.createLinearGradient(x, y, x+w, y+h);
    grad.addColorStop(0, '#e0d0c0');
    grad.addColorStop(0.4, '#c8b8a0');
    grad.addColorStop(0.7, '#d4c5b0');
    grad.addColorStop(1, '#c0b0a0');
    ctx2d.fillStyle = grad;
  } else {
    ctx2d.fillStyle = style.fill;
  }
  ctx2d.fillRect(x, y, w, h);

  // Top face (3d feel)
  ctx2d.fillStyle = 'rgba(255,255,255,0.12)';
  ctx2d.fillRect(x, y, w, 4);

  // Left shadow
  ctx2d.fillStyle = 'rgba(0,0,0,0.2)';
  ctx2d.fillRect(x, y, 3, h);

  // Stroke
  ctx2d.strokeStyle = style.stroke;
  ctx2d.lineWidth = 1;
  ctx2d.strokeRect(x+0.5, y+0.5, w-1, h-1);

  ctx2d.restore();
}

// Draw pendulum block
function drawPendulumBlock() {
  if (!pendulum) return;
  const px = pendulum.cx + Math.sin(pendulum.angle) * pendulum.swingW - pendulum.w/2;
  const style = getStyleForBlocks(score + 1);
  drawBlock({ x: px, y: pendulum.y, w: pendulum.w, h: BLOCK_H }, style, false);

  // Swing arm (subtle)
  ctx2d.save();
  ctx2d.strokeStyle = 'rgba(200,180,130,0.2)';
  ctx2d.lineWidth = 1;
  ctx2d.setLineDash([4, 8]);
  ctx2d.beginPath();
  ctx2d.moveTo(pendulum.cx, pendulum.y - 40);
  ctx2d.lineTo(px + pendulum.w/2, pendulum.y);
  ctx2d.stroke();
  ctx2d.restore();
}

// Update pendulum
function updatePendulum(dt) {
  if (!pendulum || !pendulum.active) return;
  pendulum.angle += pendulum.speed * dt;
  if (Math.abs(pendulum.angle) > Math.PI * 0.5) {
    pendulum.speed *= -1;
    pendulum.angle = Math.sign(pendulum.angle) * Math.PI * 0.5;
  }
}

// Update particles
function updateParticles(dt) {
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.15 * dt;
    p.life -= 0.025 * dt;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx2d.save();
    ctx2d.globalAlpha = p.life;
    ctx2d.fillStyle = p.color;
    ctx2d.beginPath();
    ctx2d.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx2d.fill();
    ctx2d.restore();
  });
}

// Main game loop
let lastT = 0;
function gameLoop(t) {
  const dt = Math.min((t - lastT) / 16.67, 3);
  lastT = t;

  // Shake
  let sx = 0, sy = 0;
  if (shakeT > 0) {
    sx = (Math.random()-0.5) * shakeT;
    sy = (Math.random()-0.5) * shakeT;
    shakeT = Math.max(0, shakeT - 1.5);
  }

  // BG
  animateBg(score, t);

  // 2D canvas
  ctx2d.clearRect(0, 0, gc.width, gc.height);
  ctx2d.save();
  ctx2d.translate(sx, sy);

  if (gameState === 'playing') {
    updatePendulum(dt);
    updateParticles(dt);

    // Draw all placed blocks
    blocks.forEach((b, i) => {
      drawBlock(b, getStyleForBlocks(i), true);
    });

    // Draw moving block
    drawPendulumBlock();

    // Particles
    drawParticles();
  } else if (gameState === 'gameover') {
    // Draw tower during game over
    blocks.forEach((b, i) => drawBlock(b, getStyleForBlocks(i), true));
    updateParticles(dt);
    drawParticles();
  }

  ctx2d.restore();
  requestAnimationFrame(gameLoop);
}

// Input handlers
function handleTap(e) {
  e.preventDefault();
  if (gameState === 'start') {
    document.getElementById('start-screen').style.display = 'none';
    startGame();
    return;
  }
  if (gameState === 'playing') {
    placePendulum();
    return;
  }
  if (gameState === 'gameover') {
    document.getElementById('gameover-screen').style.display = 'none';
    startGame();
    return;
  }
}

gc.addEventListener('click', handleTap, { passive: false });
gc.addEventListener('touchend', handleTap, { passive: false });
document.addEventListener('keydown', e => { if (e.code === 'Space') handleTap(e); });

// Share button
document.getElementById('share-btn').addEventListener('click', e => {
  e.stopPropagation();
  const haikus = [
    `${score} blocks to heaven / The gods looked down and laughed once / Wind took the rest`,
    `Stone upon stone / ${score} prayers toward the sky / Silence answered back`,
    `${score} blocks I placed / Hubris is a tall ladder / With no place to land`
  ];
  const text = haikus[score % haikus.length];
  navigator.clipboard.writeText(text).then(() => showFlash('✦ COPIED ✦')).catch(() => showFlash(text));
});

// Start bg scene early
updateBgForHeight(0);
requestAnimationFrame(gameLoop);
</script>
