<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fractal Fern</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  body {
    background: var(--bg, #1a2a1a);
    transition: background 1.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 32px;
  }

  #title {
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 300;
    font-style: italic;
    opacity: 0;
    transition: opacity 1.4s ease;
    line-height: 1.7;
  }
  #title.show { opacity: 1; }
  #title strong {
    font-style: normal;
    font-weight: 400;
    letter-spacing: 0.4em;
    display: block;
    font-size: clamp(13px, 2.5vw, 17px);
  }

  #bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  #progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.8s;
  }
  #progress-wrap.show { opacity: 1; }
  #progress-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  #progress-bar-bg {
    width: 120px;
    height: 1px;
    background: rgba(255,255,255,0.15);
    position: relative;
  }
  #progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 1px;
    width: 0%;
    transition: width 0.1s linear;
  }

  #counter {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.8s;
    text-align: right;
    line-height: 1.8;
  }
  #counter.show { opacity: 1; }

  #refresh-btn {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 40px;
    padding: 9px 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.8s, border-color 0.2s, background 0.2s;
  }
  #refresh-btn.show { opacity: 1; }
  #refresh-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.55);
  }
  #refresh-btn:active { background: rgba(255,255,255,0.14); }

  /* done glow pulse on canvas */
  @keyframes breathe {
    0%,100% { opacity: 1; }
    50% { opacity: 0.88; }
  }
  canvas.done { animation: breathe 4s ease-in-out infinite; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="title">
    <strong>Barnsley Fern</strong>
    Iterated Function System · Fractal Botany
  </div>

  <div id="bottom">
    <div id="progress-wrap">
      <div id="progress-label">Growing</div>
      <div id="progress-bar-bg">
        <div id="progress-bar"></div>
      </div>
    </div>
    <div id="counter">
      <div id="pt-count">0 points</div>
      <div id="fern-name" style="font-style:italic;opacity:0.6;font-size:9px;letter-spacing:0.18em;"></div>
    </div>
  </div>
</div>

<button id="refresh-btn">✦ New Fern</button>

<script>
// ════════════════════════════════════════════════════
//  FRACTAL FERN GENERATOR
//  Barnsley IFS with randomised variants
// ════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Palette themes ───────────────────────────────────
const THEMES = [
  // [bg, fern-color-start, fern-color-end, text-color]
  { bg:'#0d1a0f', c1:'#1a6b2e', c2:'#a8e063', text:'#c8e6b8', name:'Forest Deep'    },
  { bg:'#0e1520', c1:'#1a4a6b', c2:'#63c8e0', text:'#b8d8e6', name:'Blue Mist'      },
  { bg:'#1a0e14', c1:'#6b1a3a', c2:'#e063a0', text:'#e6b8cc', name:'Crimson Bloom'  },
  { bg:'#1a1508', c1:'#6b5a1a', c2:'#e0c063', text:'#e6d8b8', name:'Autumn Gold'    },
  { bg:'#0d1a1a', c1:'#1a6b6b', c2:'#63e0e0', text:'#b8e6e6', name:'Teal Frost'     },
  { bg:'#160d1a', c1:'#5a1a6b', c2:'#c063e0', text:'#d8b8e6', name:'Violet Dusk'    },
  { bg:'#1a1210', c1:'#6b2e1a', c2:'#e09063', text:'#e6ccb8', name:'Ember Glow'     },
  { bg:'#0f1a15', c1:'#1a6b4a', c2:'#63e0b0', text:'#b8e6d0', name:'Jade Mist'      },
  { bg:'#1a0d0d', c1:'#6b1a1a', c2:'#e06363', text:'#e6b8b8', name:'Ruby Wilds'     },
  { bg:'#181818', c1:'#505050', c2:'#d0d0d0', text:'#e0e0e0', name:'Silver Etch'    },
  { bg:'#0a0f1a', c1:'#1a2a6b', c2:'#6388e0', text:'#b8c4e6', name:'Midnight Indigo'},
  { bg:'#0d1a12', c1:'#1a6b35', c2:'#7be060', text:'#bae6b2', name:'Lime Garden'    },
];

// ── IFS Fern variants ────────────────────────────────
// Each transform: [a, b, c, d, e, f, probability]
const FERNS = [
  {
    name: 'Barnsley Classic',
    transforms: [
      [ 0,     0,     0,     0.16,  0,    0,    0.01],
      [ 0.85,  0.04, -0.04,  0.85,  0,    1.60, 0.85],
      [ 0.20, -0.26,  0.23,  0.22,  0,    1.60, 0.07],
      [-0.15,  0.28,  0.26,  0.24,  0,    0.44, 0.07],
    ]
  },
  {
    name: 'Thelypteris',
    transforms: [
      [ 0,     0,     0,     0.25,  0,   -0.14, 0.02],
      [ 0.95,  0.005,-0.005, 0.93, -0.002, 0.5, 0.84],
      [ 0.035,-0.2,   0.16,  0.04, -0.09,  0.02, 0.07],
      [-0.04,  0.2,   0.16,  0.04,  0.083, 0.12, 0.07],
    ]
  },
  {
    name: 'Fishbone',
    transforms: [
      [ 0,     0,     0,     0.25,  0,   -0.4,  0.02],
      [ 0.95,  0.002,-0.002, 0.93, -0.002, 0.5, 0.84],
      [ 0.035,-0.11,  0.27,  0.01, -0.05,  0.005,0.07],
      [-0.04,  0.11,  0.27,  0.01,  0.047, 0.06, 0.07],
    ]
  },
  {
    name: 'Coral Fern',
    transforms: [
      [ 0,     0,     0,     0.18,  0,    0,    0.01],
      [ 0.82,  0.06, -0.06,  0.82,  0,    1.5,  0.84],
      [ 0.15, -0.28,  0.26,  0.24, -0.1,  1.6,  0.08],
      [-0.15,  0.28,  0.26,  0.24,  0.1,  0.44, 0.07],
    ]
  },
  {
    name: 'Cyclosorus',
    transforms: [
      [ 0,     0,     0,     0.20,  0,   -0.12, 0.01],
      [ 0.81,  0.0,   0.0,   0.81, -0.032, 0.8, 0.85],
      [ 0.20, -0.22,  0.24,  0.22,  0,    1.0,  0.07],
      [-0.18,  0.22,  0.22,  0.22,  0,    0.5,  0.07],
    ]
  },
  {
    name: 'Culcita',
    transforms: [
      [ 0,     0,     0,     0.25,  0,    0.1,  0.01],
      [ 0.9,   0.05, -0.05,  0.9,   0.02, 1.4,  0.84],
      [ 0.17, -0.22,  0.22,  0.24,  0.12, 1.1,  0.08],
      [-0.22,  0.26,  0.24,  0.2,  -0.06, 0.7,  0.07],
    ]
  },
];

// ── Pick random theme & fern ─────────────────────────
const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
const fern  = FERNS [Math.floor(Math.random() * FERNS.length)];

// Apply theme
document.body.style.setProperty('--bg', theme.bg);
document.body.style.background = theme.bg;
document.getElementById('title').style.color   = theme.text;
document.getElementById('counter').style.color = theme.text;
document.querySelector('#progress-label').style.color = theme.text;
document.getElementById('progress-bar').style.background = theme.c2;
document.getElementById('refresh-btn').style.color  = theme.text;
document.getElementById('refresh-btn').style.borderColor = theme.text + '55';
document.getElementById('fern-name').textContent = fern.name;

// ── Resize ───────────────────────────────────────────
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); redrawPoints(); });
resize();

// ── IFS iteration ─────────────────────────────────────
// Store raw IFS coordinates, scale to canvas on draw
const PTS = [];   // [x, y, iter]
const TOTAL_PTS = 280000;
const DURATION  = 10000; // ms

function applyTransform(x, y, t) {
  return [
    t[0]*x + t[1]*y + t[4],
    t[2]*x + t[3]*y + t[5],
  ];
}

function pickTransform() {
  const r = Math.random();
  let acc = 0;
  for (let i=0; i<fern.transforms.length; i++) {
    acc += fern.transforms[i][6];
    if (r < acc) return fern.transforms[i];
  }
  return fern.transforms[fern.transforms.length-1];
}

// Pre-compute ALL points upfront (fast), then stream them to canvas
function generateAllPoints() {
  let x=0, y=0;
  // skip first 20 for convergence
  for (let i=0; i<20; i++) {
    [x,y] = applyTransform(x, y, pickTransform());
  }
  for (let i=0; i<TOTAL_PTS; i++) {
    [x,y] = applyTransform(x, y, pickTransform());
    PTS.push([x, y]);
  }
  // compute bounding box
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  PTS.forEach(([px,py]) => {
    if(px<minX)minX=px; if(px>maxX)maxX=px;
    if(py<minY)minY=py; if(py>maxY)maxY=py;
  });
  return { minX, maxX, minY, maxY };
}

// ── Map IFS coords → canvas coords ──────────────────
let bbox;
function ifsToCanvas(ix, iy) {
  const { minX, maxX, minY, maxY } = bbox;
  const padX = 0.08, padY = 0.10;
  const pw = W * (1 - padX*2), ph = H * (1 - padY*2);
  const scaleX = pw / (maxX - minX), scaleY = ph / (maxY - minY);
  const scale  = Math.min(scaleX, scaleY);
  const offX   = W/2 - (minX + maxX)/2 * scale;
  const offY   = H * (1-padY) + minY * scale;
  return [ix * scale + offX, offY - iy * scale];
}

// ── Off-screen accumulation buffer ───────────────────
let offCanvas, offCtx;
function initOffscreen() {
  offCanvas = document.createElement('canvas');
  offCanvas.width = W; offCanvas.height = H;
  offCtx = offCanvas.getContext('2d');
}

function redrawPoints() {
  if (!bbox || !PTS.length) return;
  initOffscreen();
  drawBatch(0, drawnCount);
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(offCanvas,0,0);
}

// ── Color interpolation ──────────────────────────────
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
const rgb1 = hexToRgb(theme.c1);
const rgb2 = hexToRgb(theme.c2);

function ptColor(i, total) {
  const t = Math.pow(i/total, 0.7);
  const r = (rgb1[0] + (rgb2[0]-rgb1[0])*t)|0;
  const g = (rgb1[1] + (rgb2[1]-rgb1[1])*t)|0;
  const b = (rgb1[2] + (rgb2[2]-rgb1[2])*t)|0;
  return `rgba(${r},${g},${b},0.72)`;
}

// ── Draw a batch of points ────────────────────────────
function drawBatch(from, to) {
  // Draw in micro-batches for colour variation
  const CHUNK = 500;
  for (let s=from; s<to; s+=CHUNK) {
    const end = Math.min(s+CHUNK, to);
    offCtx.fillStyle = ptColor(s, TOTAL_PTS);
    offCtx.beginPath();
    for (let i=s; i<end; i++) {
      const [cx2, cy2] = ifsToCanvas(PTS[i][0], PTS[i][1]);
      offCtx.rect(cx2, cy2, 1.1, 1.1);
    }
    offCtx.fill();
  }
}

// ── Animation ────────────────────────────────────────
let drawnCount = 0;
let startTime  = null;
let animId     = null;
let finished   = false;

const progressBar   = document.getElementById('progress-bar');
const ptCount       = document.getElementById('pt-count');
const progressWrap  = document.getElementById('progress-wrap');

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const fraction = Math.min(elapsed / DURATION, 1);

  // Ease-in-out (smoother growth at start, slows at end)
  const eased = fraction < 0.5
    ? 2*fraction*fraction
    : 1 - Math.pow(-2*fraction+2, 2)/2;

  const target = Math.floor(eased * TOTAL_PTS);

  if (target > drawnCount) {
    drawBatch(drawnCount, target);
    drawnCount = target;
    // Blit offscreen to main canvas
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(offCanvas, 0, 0);
  }

  // Update UI
  progressBar.style.width = (fraction * 100) + '%';
  ptCount.textContent = drawnCount.toLocaleString() + ' points';

  if (fraction < 1) {
    animId = requestAnimationFrame(animate);
  } else {
    finishGrowth();
  }
}

function finishGrowth() {
  finished = true;
  canvas.classList.add('done');
  progressWrap.style.opacity = '0';
  document.getElementById('refresh-btn').classList.add('show');
  document.getElementById('progress-label').textContent = 'Complete';
}

// ── Boot ─────────────────────────────────────────────
function boot() {
  canvas.classList.remove('done');
  finished = false;
  drawnCount = 0;
  startTime  = null;
  PTS.length = 0;

  document.getElementById('title').classList.remove('show');
  progressWrap.classList.remove('show');
  document.getElementById('counter').classList.remove('show');
  document.getElementById('refresh-btn').classList.remove('show');

  // Generate all IFS points first
  bbox = generateAllPoints();
  initOffscreen();

  // Slight delay for the fade-in
  setTimeout(() => {
    document.getElementById('title').classList.add('show');
    progressWrap.classList.add('show');
    document.getElementById('counter').classList.add('show');
    animId = requestAnimationFrame(animate);
  }, 400);
}

// ── Refresh button ────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => {
  window.location.reload();
});

// ── Kick off ─────────────────────────────────────────
boot();
</script>
</body>
</html>
