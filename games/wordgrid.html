<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WordGrid</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f0f0f0;
    overscroll-behavior-y: contain; 
}

#topbar{
    padding:10px;
    background:#333;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#game{
    display:flex;
    flex-wrap:wrap;
    height:calc(100vh - 50px);
    overflow:auto;
}

#wordlist{
    width:250px;
    background:#2f3b35; 
    border-right:2px solid #1a241f;
    padding:10px;
    overflow-y:auto;
}

.word{
    background:#4caf50;
    color:white;
    padding:6px;
    margin:5px 0;
    text-align:center;
    border-radius:4px;
    cursor:grab;
    user-select:none;
    -webkit-user-select: none;
    touch-action: none; 
    transition: transform 0.1s;
}

.word:active {
    transform: scale(1.05);
    background: #2e7d32;
}

#boardWrapper{
    flex:1;
    padding:10px;
    overflow:auto;
    /* Dark green, slightly lighter than word list (#2f3b35) */
    background:#3a4d43; 
}

#board{
    display:grid;
    grid-template-columns:repeat(24,36px);
    grid-template-rows:repeat(24,36px);
    gap:1px;
    background:#444; 
    width:max-content;
}

.cell{
    width:36px;
    height:36px;
    /* Reverted to white background */
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:16px;
    /* Black letters */
    color: black;
}

.cell.filled{
    background:#fff9c4;
}
</style>
</head>

<body>

<div id="topbar">
    <div>
        <b>WordGrid</b>
        <button onclick="newGame()">New Game</button>
        <span id="score"></span>
    </div>
    <div>Hold to rotate (Mobile) / Double-click (PC)</div>
</div>

<div id="game">
    <div id="wordlist"></div>
    <div id="boardWrapper"><div id="board"></div></div>
</div>

<script>
const SIZE=24;
let board=[];
let draggedWord=null;
let placedWords=0;
let activeWords=new Set();

const LENGTH_BUCKETS={
    short:{min:3,max:4,count:5},
    medium:{min:5,max:6,count:7},
    long:{min:7,max:8,count:5},
    xlong:{min:9,max:10,count:3}
};

const DICTIONARY=`ACE ACT ADD AGE AGO AID AIM AIR ALL AND ANY ARE ARM ART ASH ASK ASP ASS BAD BAG BAN BAR BAT BAY BED BEE BEG BEL BET BID BIG BIN BIT BOA BOB BOG BOO BOW BOX BOY BRA BUD BUG BUM BUN BUS BUT BUY BYE CAB CAD CAM CAN CAP CAR CAT CAW COB COD COG CON COP COT COW COY CRY CUB CUD CUE CUP CUR CUT DAB DAD DAM DAN DAY DEN DEW DID DIE DIG DIM DIN DIP DOG DON DOT DRY DUB DUE DUG DUO DYE EAR EAT EBB EGG EGO ELK ELM END EON ERA ERE ERG ERR EVE EYE FAD FAN FAR FAT FAX FED FEE FEN FEW FIG FIN FIR FIT FIX FLY FOB FOE FOG FOR FOX FRO FRY FUN FUR GAG GAP GAS GAY GEL GEM GET GIG GIN GNU GOB GOD GOT GUM GUN GUT GUY GYM HAD HAG HAM HAS HAT HAY HEM HEN HER HEW HEX HID HIE HIP HIS HIT HOB HOG HOP HOT HOW HUB HUE HUG HUM HUN HUT ICE ICY ILL IMP INK INN ION IRE IRK ITS IVY JAB JAM JAR JAW JAY JET JIB JIG JOB JOG JOT JOY JUG JUN JUT KEE KEG KEN KEY KID KIN KIP KIT LAD LAG LAM LAP LAW LAX LAY LED LEG LET LID LIE LIP LIT LOB LOG LOT LOW LOX LUG LUM LUV LYE MAD MAG MAN MAP MAR MAT MAW MAX MAY MEN MET MEW MID MIX MOB MOD MOM MOO MOP MOW MUD MUG MUM NAB NAG NAP NAY NET NEW NIL NIP NOD NON NOR NOT NOW NUB NUN NUT OAF OAK OAR OAT ODD ODE OFF OIL OLD ONE OPT ORB ORE OUR OUT OWE OWL OWN PAD PAL PAN PAP PAR PAS PAT PAW PAY PEA PEG PEN PEP PER PET PEW PHI PIE PIG PIN PIP PIT PLY POD POI POP POT POW PRO PRY PUB PUG PUN PUP PUT QUO RAD RAG RAM RAN RAP RAT RAW RAY RED REF REG REM REP REV RIB RID RIG RIM RIP ROB ROD ROE ROT ROW RUB RUE RUG RUM RUN RUT RYE SAC SAD SAG SAL SAP SAT SAW SAY SEA SEC SEE SET SEW SEX SHE SHY SIB SIN SIP SIR SIT SIX SKI SKY SLY SOB SOD SOL SON SOW SOY SPA SPY STY SUB SUE SUM SUN SUP TAB TAD TAG TAM TAN TAP TAR TAX TEA TED TEN THE THO THY TIC TIE TIN TIP TOE TOG TOM TON TOO TOP TOW TOY TRY TUB TUG TUN TWO TYO UDO UGH UKE UMP UP SURN USE UTU VAC VAN VAT VAV VAW VEE VET VEX VIA VIE VIG VIM VIN VIS VOW VOX VUG WAD WAG WAN WAR WAS WAX WAY WEB WEB WED WEE WEN WET WHO WHY WIG WIN WIT WOE WOK WON WOO WOW WRY WUD WYE WYN XIS YAD YAG YAH YAK YAM YAP YAR YAW YAY YEA YEH YEN YE .toUpperCase().split(/\s+/);

function randomWord(bucket){
    let attempts=0;
    let w;
    const {min, max} = LENGTH_BUCKETS[bucket];
    do{
        w=DICTIONARY[Math.floor(Math.random()*DICTIONARY.length)];
        attempts++;
    }while((activeWords.has(w) || w.length < min || w.length > max) && attempts < 2000);
    return w;
}

function buildBoard(){
    board=[];
    const boardDiv=document.getElementById("board");
    boardDiv.innerHTML="";
    for(let r=0;r<SIZE;r++){
        let row=[];
        for(let c=0;c<SIZE;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.addEventListener("dragover",e=>e.preventDefault());
            cell.addEventListener("drop",dropWord);
            boardDiv.appendChild(cell);
            row.push("");
        }
        board.push(row);
    }
}

function populateList(){
    activeWords.clear();
    const list=document.getElementById("wordlist");
    list.innerHTML="";
    for(let bucket in LENGTH_BUCKETS){
        for(let i=0;i<LENGTH_BUCKETS[bucket].count;i++){
            addWordToList(bucket);
        }
    }
}

function toggleRotation(el) {
    el.dataset.dir = el.dataset.dir === "H" ? "V" : "H";
    el.style.background = el.dataset.dir === "H" ? "#4caf50" : "#2196f3";
}

function addWordToList(bucket){
    let w=randomWord(bucket);
    if(!w) return; 
    activeWords.add(w);
    const list=document.getElementById("wordlist");
    let div=document.createElement("div");
    div.className="word";
    div.textContent=w;
    div.dataset.word=w;
    div.dataset.bucket=bucket;
    div.dataset.dir="H";

    let pressTimer;

    // Desktop
    div.draggable=true;
    div.ondragstart = () => { draggedWord = div; };
    div.ondblclick = () => toggleRotation(div);

    // Mobile Fix
    div.addEventListener('touchstart', function(e) {
        draggedWord = div; 
        pressTimer = window.setTimeout(() => toggleRotation(div), 500);
    }, {passive: false});

    div.addEventListener('touchmove', function(e) {
        clearTimeout(pressTimer);
    }, {passive: false});

    div.addEventListener('touchend', function(e) {
        clearTimeout(pressTimer);
        const touch = e.changedTouches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('cell')) {
            handlePlacement(el);
        }
    });

    list.appendChild(div);
}

function dropWord(e){
    e.preventDefault();
    handlePlacement(this);
}

function handlePlacement(cellEl) {
    if(!draggedWord) return;
    
    const word=draggedWord.dataset.word;
    const dir=draggedWord.dataset.dir;
    const bucket=draggedWord.dataset.bucket;
    const r=parseInt(cellEl.dataset.r);
    const c=parseInt(cellEl.dataset.c);

    if(!canPlace(word,r,c,dir)) {
        draggedWord = null;
        return;
    }

    placeWord(word,r,c,dir);
    activeWords.delete(word);
    draggedWord.remove();
    addWordToList(bucket);
    draggedWord=null;
    updateScore();
}

function isLetter(r,c){
    if(r<0||c<0||r>=SIZE||c>=SIZE) return false;
    return board[r][c]!="";
}

function canPlace(word,r,c,dir){
    let intersects=false;
    for(let i=0;i<word.length;i++){
        let rr=r+(dir==="V"?i:0);
        let cc=c+(dir==="H"?i:0);
        if(rr>=SIZE||cc>=SIZE) return false;
        let boardLetter=board[rr][cc];
        if(boardLetter!=="" && boardLetter!==word[i]) return false;
        if(boardLetter===word[i]) intersects=true;
        if(dir==="H"){
            if(boardLetter===""){
                if(isLetter(rr-1,cc)||isLetter(rr+1,cc)) return false;
            }
        }else{
            if(boardLetter===""){
                if(isLetter(rr,cc-1)||isLetter(rr,cc+1)) return false;
            }
        }
    }
    if(dir==="H"){
        if(isLetter(r,c-1)||isLetter(r,c+word.length)) return false;
    }else{
        if(isLetter(r-1,c)||isLetter(r+word.length,c)) return false;
    }
    if(placedWords>0 && !intersects) return false;
    return true;
}

function placeWord(word,r,c,dir){
    for(let i=0;i<word.length;i++){
        let actualCC = c + (dir === "H" ? i : 0);
        let actualRR = r + (dir === "V" ? i : 0);
        
        board[actualRR][actualCC]=word[i];
        let cell=document.querySelector(`[data-r='${actualRR}'][data-c='${actualCC}']`);
        cell.textContent=word[i];
        cell.classList.add("filled");
    }
    placedWords++;
}

function updateScore(){
    let filled=0;
    for(let r=0;r<SIZE;r++)
        for(let c=0;c<SIZE;c++)
            if(board[r][c]!="") filled++;
    let percent=(filled/(SIZE*SIZE))*100;
    document.getElementById("score").textContent=`Score: ${percent.toFixed(1)}% filled`;
}

function newGame(){
    placedWords=0;
    buildBoard();
    populateList();
    updateScore();
}

newGame();
</script>

</body>
