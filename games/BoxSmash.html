<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BoxSmash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100dvh;
    touch-action: none;
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }

  .hud-label {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(10px, 2.5vw, 16px);
    letter-spacing: 0.1em;
    color: #888;
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(20px, 5vw, 36px);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  #scoreDisplay { color: #00ffcc; }
  #timerDisplay { color: #ff4444; }
  #comboDisplay { color: #ffdd00; }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  #overlay h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(36px, 12vw, 96px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
  }

  #overlay .subtitle {
    font-size: clamp(13px, 3vw, 20px);
    color: #aaa;
    margin-bottom: 30px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #overlay .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(12px, 2.5vw, 15px);
    color: #ccc;
  }

  .legend-box {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 2px solid rgba(255,255,255,0.3);
  }

  #btn {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(16px, 4vw, 28px);
    letter-spacing: 0.12em;
    padding: clamp(12px,3vw,18px) clamp(32px,8vw,64px);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.1s, filter 0.1s;
    background: linear-gradient(135deg, #00ffcc, #00aaff);
    color: #000;
  }

  #btn:active { transform: scale(0.95); filter: brightness(0.85); }

  #overlay.lose h1 { color: #ff3333; text-shadow: 0 0 30px #ff000066; }
  #overlay.win h1  { color: #00ffcc; text-shadow: 0 0 30px #00ffcc66; }
  #overlay.start h1 { color: #ffdd00; text-shadow: 0 0 30px #ffdd0044; }

  .result-score {
    font-size: clamp(14px,3.5vw,22px);
    color: #aaa;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }
  .result-score span { color: #00ffcc; font-size: 1.4em; }
</style>
</head>
<body>

<div id="hud">
  <div>
    <div class="hud-label">Score</div>
    <div class="hud-value" id="scoreDisplay">0</div>
  </div>
  <div style="text-align:center">
    <div class="hud-label">Time</div>
    <div class="hud-value" id="timerDisplay">2:00</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">Combo</div>
    <div class="hud-value" id="comboDisplay">x1</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay" class="start">
  <h1>BoxSmash</h1>
  <p class="subtitle">Smash every block before it lands!</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#33dd66"></div> 1 hit</div>
    <div class="legend-item"><div class="legend-box" style="background:#ffdd00"></div> 2 hits</div>
    <div class="legend-item"><div class="legend-box" style="background:#ff4444"></div> 3 hits</div>
  </div>
  <button id="btn" onclick="startGame()">Play</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

let W, H, BLOCK, DANGER_Y;
let blocks = [], particles = [], floatingTexts = [];
let score = 0, combo = 1, lastSmashTime = 0;
let gameRunning = false, animFrame;
let spawnInterval, diffInterval;
let timeLeft = 120;
let timerInterval;
let spawnRate = 1000;
let spawnCount = 1;
let dropSpeed = 1.2;

// Resize
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  BLOCK    = Math.round(W * 0.044);
  DANGER_Y = H * 0.6;
}
window.addEventListener('resize', () => { resize(); });
resize();

// ───── Block ─────
const COLORS = {
  green:  { fill: '#33dd66', shadow: '#00ff8888', hp: 1 },
  yellow: { fill: '#ffdd00', shadow: '#ffdd0066', hp: 2 },
  red:    { fill: '#ff4444', shadow: '#ff000066', hp: 3 },
};
const COLOR_KEYS = ['green','yellow','red'];

function pickColor() {
  // weighted: 50% green, 30% yellow, 20% red
  const r = Math.random();
  if (r < 0.50) return 'green';
  if (r < 0.80) return 'yellow';
  return 'red';
}

function spawnBlock() {
  const col  = pickColor();
  const info = COLORS[col];
  const x    = BLOCK/2 + Math.random() * (W - BLOCK);
  blocks.push({
    x, y: -BLOCK/2,
    col, fill: info.fill, shadow: info.shadow,
    hp: info.hp, maxHp: info.hp,
    landed: false,
    shakeT: 0,
    scaleT: 0,
  });
}

function spawnBatch() {
  for (let i = 0; i < spawnCount; i++) {
    setTimeout(spawnBlock, i * 120);
  }
}

// ───── Landing stack ─────
// landedGrid[col] = stack of landed block tops (y values)
let landedColumns = {}; // x-bucket → top y

function bucketX(x) { return Math.round(x / BLOCK); }

function topY(x) {
  const b = bucketX(x);
  return landedColumns[b] !== undefined ? landedColumns[b] : H + BLOCK;
}

function setTop(x, y) {
  const b = bucketX(x);
  if (landedColumns[b] === undefined || y < landedColumns[b]) {
    landedColumns[b] = y;
  }
}

// ───── Particles ─────
function burst(x, y, color) {
  const count = 18 + Math.floor(Math.random() * 10);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      r: 2 + Math.random() * 4,
      color,
    });
  }
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -2.5 });
}

// ───── Smash handler ─────
function handleSmash(px, py) {
  if (!gameRunning) return;
  // find topmost unsmashed block at point
  let hit = null;
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.landed) continue;
    if (Math.abs(px - b.x) < BLOCK/2 && Math.abs(py - b.y) < BLOCK/2) {
      hit = b; break;
    }
  }
  if (!hit) return;

  hit.hp--;
  hit.shakeT = 12;
  hit.scaleT = 8;

  const now = Date.now();
  if (now - lastSmashTime < 800) { combo++; } else { combo = 1; }
  lastSmashTime = now;

  if (hit.hp <= 0) {
    const pts = (hit.maxHp === 1 ? 10 : hit.maxHp === 2 ? 25 : 50) * combo;
    score += pts;
    burst(hit.x, hit.y, hit.fill);
    addFloatingText(hit.x, hit.y - BLOCK/2, `+${pts}`, hit.fill);
    blocks.splice(blocks.indexOf(hit), 1);
  }

  updateHUD();
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handleSmash(e.offsetX, e.offsetY);
});

// ───── Update ─────
function update(dt) {
  // blocks
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.landed) continue;

    const ty = topY(b.x) - BLOCK; // target y (top of stack below)
    b.y += dropSpeed * dt * 60;

    if (b.y >= ty) {
      b.y = ty;
      b.landed = true;
      setTop(b.x, b.y);

      // lose check
      if (b.y <= DANGER_Y) {
        endGame(false);
        return;
      }
    }

    if (b.shakeT > 0) b.shakeT--;
    if (b.scaleT > 0) b.scaleT--;
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.y += f.vy; f.life -= 0.025;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}

// ───── Draw ─────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Subtle grid bg
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gSize = BLOCK * 1.5;
  for (let x = 0; x < W; x += gSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Danger line
  ctx.save();
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 8]);
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y); ctx.lineTo(W, DANGER_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Danger label
  ctx.save();
  ctx.font = `bold ${Math.round(BLOCK * 0.45)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = '#ff4444aa';
  ctx.textAlign = 'right';
  ctx.fillText('DANGER ZONE', W - 8, DANGER_Y - 6);
  ctx.restore();

  // Blocks
  for (const b of blocks) {
    ctx.save();
    const shake = b.shakeT > 0 ? (Math.random() - 0.5) * 5 : 0;
    const sc    = b.scaleT > 0 ? 1 + b.scaleT * 0.015 : 1;
    ctx.translate(b.x + shake, b.y);
    ctx.scale(sc, sc);

    // Glow
    ctx.shadowColor = b.shadow;
    ctx.shadowBlur  = b.landed ? 4 : 14;

    // Body
    const half = BLOCK / 2;
    const r = BLOCK * 0.12;
    ctx.beginPath();
    ctx.roundRect(-half, -half, BLOCK, BLOCK, r);

    if (b.landed) {
      ctx.fillStyle = b.fill + '55';
      ctx.strokeStyle = b.fill + '44';
    } else {
      // Gradient fill
      const grad = ctx.createLinearGradient(-half, -half, half, half);
      grad.addColorStop(0, lighten(b.fill, 40));
      grad.addColorStop(1, b.fill);
      ctx.fillStyle = grad;
      ctx.strokeStyle = b.fill;
    }
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();

    // HP pips
    if (!b.landed && b.maxHp > 1) {
      const pip = BLOCK * 0.13;
      const gap = pip * 1.5;
      const total = (b.maxHp - 1) * gap;
      for (let p = 0; p < b.maxHp; p++) {
        ctx.beginPath();
        ctx.arc(-total/2 + p*gap, BLOCK*0.28, pip/2, 0, Math.PI*2);
        ctx.fillStyle = p < b.hp ? '#fff' : 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 0;
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Floating texts
  ctx.save();
  for (const f of floatingTexts) {
    ctx.globalAlpha = f.life;
    ctx.font = `bold ${Math.round(BLOCK * 0.6)}px 'Black Ops One', cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 12;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.restore();
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255, (n>>16)+amt);
  const g = Math.min(255, ((n>>8)&0xff)+amt);
  const b = Math.min(255, (n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// ───── Game loop ─────
let lastT = 0;
function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  if (gameRunning) { update(dt); draw(); }
  animFrame = requestAnimationFrame(loop);
}

// ───── HUD ─────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('comboDisplay').textContent = `x${combo}`;
}

function updateTimer() {
  timeLeft--;
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if (timeLeft <= 0) endGame(true);
}

// ───── Difficulty ramp ─────
function rampDifficulty() {
  const elapsed = 120 - timeLeft;
  // Every 15s: increase spawn count and speed
  if (elapsed < 15)       { spawnCount = 1; spawnRate = 1000; dropSpeed = 1.1; }
  else if (elapsed < 30)  { spawnCount = 1; spawnRate = 800;  dropSpeed = 1.3; }
  else if (elapsed < 45)  { spawnCount = 2; spawnRate = 750;  dropSpeed = 1.5; }
  else if (elapsed < 60)  { spawnCount = 2; spawnRate = 600;  dropSpeed = 1.7; }
  else if (elapsed < 80)  { spawnCount = 3; spawnRate = 500;  dropSpeed = 2.0; }
  else if (elapsed < 100) { spawnCount = 3; spawnRate = 400;  dropSpeed = 2.3; }
  else                    { spawnCount = 4; spawnRate = 350;  dropSpeed = 2.6; }

  // Restart spawn timer at new rate
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnBatch, spawnRate);
}

// ───── Start / End ─────
function startGame() {
  document.getElementById('overlay').style.display = 'none';

  blocks = []; particles = []; floatingTexts = [];
  landedColumns = {};
  score = 0; combo = 1; timeLeft = 120;
  spawnRate = 1000; spawnCount = 1; dropSpeed = 1.1;
  gameRunning = true;

  updateHUD();
  document.getElementById('timerDisplay').textContent = '2:00';

  spawnBatch();
  spawnInterval = setInterval(spawnBatch, spawnRate);
  timerInterval  = setInterval(updateTimer, 1000);
  diffInterval   = setInterval(rampDifficulty, 5000);
}

function endGame(won) {
  gameRunning = false;
  clearInterval(spawnInterval);
  clearInterval(timerInterval);
  clearInterval(diffInterval);

  const ov = document.getElementById('overlay');
  ov.className = won ? 'win' : 'lose';
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h1>${won ? '🏆 You Win!' : '💥 Game Over'}</h1>
    <p class="subtitle">${won ? 'Incredible smashing skills!' : 'A block landed in the danger zone!'}</p>
    <p class="result-score">Final Score: <span>${score}</span></p>
    <button id="btn" onclick="startGame()">Try Again</button>
  `;
}

// ───── Boot ─────
requestAnimationFrame(loop);
</script>
</body>
</html>
