<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>13 Key Piano</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#piano {
    display: flex;
    background: #333;
    padding: 10px;
    border-radius: 6px;
}

.key {
    width: 60px;
    height: 220px;
    margin: 2px;
    background: white;
    border: 1px solid #999;
    border-radius: 0 0 6px 6px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 10px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
}

.key:active {
    background: #ddd;
}
</style>
</head>
<body>

<div id="piano"></div>

<script>
const notes = [
  {name:"C", freq:261.63},
  {name:"D", freq:293.66},
  {name:"E", freq:329.63},
  {name:"F", freq:349.23},
  {name:"G", freq:392.00},
  {name:"A", freq:440.00},
  {name:"B", freq:493.88},
  {name:"C", freq:523.25},
  {name:"D", freq:587.33},
  {name:"E", freq:659.25},
  {name:"F", freq:698.46},
  {name:"G", freq:783.99},
  {name:"A", freq:880.00}
];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const piano = document.getElementById("piano");

function play(freq){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

    osc.start();
    osc.stop(audioCtx.currentTime + 1);
}

notes.forEach(n => {
    const key = document.createElement("div");
    key.className = "key";
    key.textContent = n.name;
    key.onclick = () => play(n.freq);
    piano.appendChild(key);
});
</script>

</body>
</html>
