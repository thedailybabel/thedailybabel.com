<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GoldFish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    background: #000;
    font-family: Georgia, serif;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  #tank {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ── Water gradient background ── */
  #water {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      #0a2a4a 0%,
      #0d3b6e 18%,
      #0e4a80 35%,
      #0b5a8a 55%,
      #0a6890 75%,
      #1a7080 90%,
      #1a6060 100%
    );
  }

  /* ── Caustic light ripple layers ── */
  .caustic {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.07;
  }
  .caustic-1 {
    background: radial-gradient(ellipse 80px 40px at 20% 30%, #aef 0%, transparent 70%),
                radial-gradient(ellipse 60px 30px at 60% 15%, #aef 0%, transparent 70%),
                radial-gradient(ellipse 100px 50px at 85% 40%, #aef 0%, transparent 70%);
    animation: caustic1 5s ease-in-out infinite alternate;
  }
  .caustic-2 {
    background: radial-gradient(ellipse 70px 35px at 40% 25%, #9df 0%, transparent 70%),
                radial-gradient(ellipse 90px 45px at 75% 10%, #9df 0%, transparent 70%);
    animation: caustic2 7s ease-in-out infinite alternate;
  }
  @keyframes caustic1 { from { transform: translateX(-15px) scaleX(1); } to { transform: translateX(15px) scaleX(1.1); } }
  @keyframes caustic2 { from { transform: translateX(10px) scaleY(1); } to { transform: translateX(-10px) scaleY(1.15); } }

  /* ── Floating bubbles ── */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(200,240,255,0.1));
    border: 1px solid rgba(180,230,255,0.4);
    animation: rise linear infinite;
    pointer-events: none;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
  }

  /* ── SVG scene canvas ── */
  #scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Fish wrapper ── */
  #fish-wrapper {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #fish {
    position: absolute;
    cursor: pointer;
    pointer-events: all;
    transform-origin: center center;
    transition: filter 0.3s;
    /* start offscreen left */
    left: -120px;
  }

  #fish:hover { filter: drop-shadow(0 0 12px rgba(255,200,50,0.9)); }
  #fish.clicked { filter: drop-shadow(0 0 20px rgba(255,255,100,1)); }

  #fish svg {
    display: block;
    filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.5));
  }

  /* ── Hint text ── */
  #hint {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 240, 255, 0.75);
    font-size: clamp(12px, 2.5vw, 16px);
    letter-spacing: 0.08em;
    text-shadow: 0 1px 4px rgba(0,0,40,0.8);
    pointer-events: none;
    white-space: nowrap;
    animation: hintPulse 3s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }

  /* ── Treasure chest lid animation (CSS-driven) ── */
  #chest-lid {
    transform-origin: 50% 100%;
    animation: chestOpen 6s ease-in-out infinite;
  }
  @keyframes chestOpen {
    0%,40%   { transform: rotate(0deg); }
    50%,60%  { transform: rotate(-28deg); }
    70%,100% { transform: rotate(0deg); }
  }

  /* ── Plant sway ── */
  .plant-g { transform-origin: bottom center; }
  .plant-1 { animation: sway1 4.5s ease-in-out infinite; }
  .plant-2 { animation: sway2 5.2s ease-in-out infinite; }
  .plant-3 { animation: sway3 3.8s ease-in-out infinite; }
  @keyframes sway1 { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(4deg)} }
  @keyframes sway2 { 0%,100%{transform:rotate(4deg)}  50%{transform:rotate(-5deg)} }
  @keyframes sway3 { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(6deg)} }
</style>
</head>
<body>

<div id="tank">
  <div id="water"></div>
  <div class="caustic caustic-1"></div>
  <div class="caustic caustic-2"></div>

  <!-- SVG background scene -->
  <svg id="scene" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

      <!-- Rock gradient -->

    <!-- ── Treasure Chest ── -->

      <!-- towers -->

      <!-- battlements left -->

      <rect x="-43" y="-14" width="6" height="8" fill="#3a3a4a"/>
      <rect x="-34" y="-14" width="6" height="8" fill="#3a3a4a"/>
      <!-- battlements right -->
      <rect x="30"  y="-14" width="6" height="8" fill="#3a3a4a"/>
      <rect x="39"  y="-14" width="6" height="8" fill="#3a3a4a"/>
      <rect x="48"  y="-14" width="6" height="8" fill="#3a3a4a"/>
      <!-- windows -->
      <rect x="-44" y="-2" width="7" height="9" rx="3" fill="#0a1a2a"/>
      <rect x="37"  y="-2" width="7" height="9" rx="3" fill="#0a1a2a"/>
      <!-- moss tints -->
      <rect x="-45" y="30" width="8" height="27" fill="#1a5030" opacity="0.4"/>
      <rect x="37"  y="20" width="8" height="37" fill="#1a5030" opacity="0.3"/>

    <!-- ── Small background fish ── -->
    <!-- bg fish 1 -->

      <ellipse cx="200" cy="180" rx="20" ry="9" fill="#e05080" transform="rotate(-5,200,180)"/>
      <polygon points="180,180 165,172 165,188" fill="#c04060"/>
      <circle cx="210" cy="178" r="2" fill="#111"/>
    </g>
    <!-- bg fish 2 -->
    <g opacity="0.25">
      <ellipse cx="750" cy="250" rx="15" ry="7" fill="#50c0e0" transform="rotate(8,750,250)"/>

  <!-- Bubbles (injected via JS) -->

  <!-- Hint -->
  <div id="hint">🐟 Tap the goldfish to send it swimming!</div>

  <!-- Fish element -->
  <div id="fish-wrapper">
    <div id="fish">
      <svg width="110" height="70" viewBox="0 0 110 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="45%" cy="42%" r="55%">
            <stop offset="0%"  stop-color="#ffe680"/>
            <stop offset="40%" stop-color="#ffaa00"/>

        <!-- Tail -->
        <path d="M20,35 Q5,18 0,8 Q15,32 15,35 Q15,38 0,62 Q5,52 20,35 Z" fill="url(#tailGrad)"/>
        <!-- Body -->
        <ellipse cx="60" cy="35" rx="42" ry="24" fill="url(#bodyGrad)"/>
        <!-- Belly sheen -->
        <ellipse cx="62" cy="42" rx="30" ry="13" fill="url(#bellyGrad)"/>

        <!-- Pectoral fin -->

        <!-- Eye -->
        <circle cx="90" cy="30" r="7" fill="white"/>
        <circle cx="91" cy="30" r="5" fill="url(#eyeGrad)"/>
        <circle cx="93" cy="28" r="1.8" fill="white" opacity="0.8"/>
        <!-- Gill line -->
        <path d="M78,20 Q75,35 78,48" stroke="rgba(160,60,0,0.4)" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
  </div>
</div>

<script>
(function() {
  const fish        = document.getElementById('fish');
  const tank        = document.getElementById('tank');
  const hint        = document.getElementById('hint');

  const FISH_W      = 110;   // fish SVG width
  const MARGIN      = 4;     // px from edge

  let swimming      = false;
  let direction     = 1;     // 1 = right, -1 = left
  let currentX      = 0;     // fish left position in px
  let raf           = null;

  // ── Vertical position: roughly 40-65% from top ──
  const FISH_TOP_PCT = 0.46;

  function positionFishY() {
    const h = tank.clientHeight;
    const fishH = 70;
    fish.style.top  = Math.floor(h * FISH_TOP_PCT - fishH / 2) + 'px';
  }

  function getMaxX() {
    return tank.clientWidth - FISH_W - MARGIN;
  }

  function faceFish(dir) {
    // dir=1 → facing right (normal), dir=-1 → flip horizontally
    fish.style.transform = dir === 1 ? 'scaleX(1)' : 'scaleX(-1)';
  }

  function startSwimRight() {
    if (swimming) return;
    swimming  = true;
    direction = 1;
    faceFish(1);
    hint.textContent = '🐟 Tap the goldfish to send it swimming!';
    animate();
  }

  function startSwimLeft() {
    if (swimming) return;
    swimming  = true;
    direction = -1;
    faceFish(-1);
    animate();
  }

  const SPEED = 0.9; // px per frame (~55px/s at 60fps)

  function animate() {
    const maxX = getMaxX();

    if (direction === 1) {
      currentX += SPEED;
      if (currentX >= maxX) {
        currentX = maxX;
        fish.style.left = currentX + 'px';
        swimming  = false;
        hint.textContent = '👆 Tap the fish!';
        return;
      }
    } else {
      currentX -= SPEED;
      if (currentX <= MARGIN) {
        currentX = MARGIN;
        fish.style.left = currentX + 'px';
        swimming  = false;
        hint.textContent = '👆 Tap the fish!';
        return;
      }
    }

    fish.style.left = currentX + 'px';
    raf = requestAnimationFrame(animate);
  }

  // Body wobble animation
  let wobblePhase = 0;
  function wobble() {
    if (swimming) {
      wobblePhase += 0.08;
      const wy = Math.sin(wobblePhase) * 4;
      const rot = Math.sin(wobblePhase) * 2;
      fish.style.marginTop = wy + 'px';
      // apply wobble without losing the scaleX flip
      const scaleX = direction === 1 ? 1 : -1;
      fish.style.transform = `scaleX(${scaleX}) rotate(${rot * scaleX}deg)`;
    }
    requestAnimationFrame(wobble);
  }
  wobble();

  // ── Click / tap handler ──
  function onFishClick(e) {
    e.stopPropagation();
    if (swimming) return;

    // flash effect
    fish.classList.add('clicked');
    setTimeout(() => fish.classList.remove('clicked'), 300);

    if (direction === 1) {
      // was going right, now go left
      startSwimLeft();
    } else {
      // was going left, now go right
      startSwimRight();
    }
  }

  fish.addEventListener('click', onFishClick);
  fish.addEventListener('touchend', function(e) {
    e.preventDefault();
    onFishClick(e);
  });

  // ── Init ──
  function init() {
    positionFishY();
    currentX  = MARGIN;
    fish.style.left = currentX + 'px';
    direction = 1;
    faceFish(1);
    // auto-start swimming right on load
    setTimeout(startSwimRight, 600);
  }

  window.addEventListener('resize', () => {
    positionFishY();
    // clamp position
    const maxX = getMaxX();
    if (currentX > maxX) { currentX = maxX; fish.style.left = currentX + 'px'; }
  });

  init();

  // ── Bubble generator ──
  function makeBubble() {
    const b    = document.createElement('div');
    b.className = 'bubble';
    const sz   = 4 + Math.random() * 12;
    b.style.width  = sz + 'px';
    b.style.height = sz + 'px';
    b.style.left   = (5 + Math.random() * 90) + '%';
    b.style.bottom = '12%';
    const dur = 6 + Math.random() * 8;
    const delay = Math.random() * 4;
    b.style.animationDuration = dur + 's';
    b.style.animationDelay    = delay + 's';
    tank.appendChild(b);
    setTimeout(() => b.remove(), (dur + delay) * 1000 + 200);
  }

  setInterval(makeBubble, 900);
  // seed a few immediately
  for (let i = 0; i < 5; i++) setTimeout(makeBubble, i * 300);

})();
</script>
</body>
</html>
