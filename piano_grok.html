<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>13-Key White Piano</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
    }

    .piano-container {
        display: flex;
        gap: 4px;
        padding: 20px;
        background: #111;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }

    .key {
        width: 60px;
        height: 280px;
        background: white;
        border: 2px solid #444;
        border-radius: 0 0 8px 8px;
        box-shadow: 
            inset 0 2px 4px #ddd,
            0 10px 20px rgba(0,0,0,0.6);
        position: relative;
        user-select: none;
        transition: all 0.08s ease;
        cursor: pointer;
    }

    .key:active,
    .key.pressed {
        transform: translateY(6px);
        box-shadow: 
            inset 0 2px 6px #bbb,
            0 4px 8px rgba(0,0,0,0.7);
        background: #f8f8f8;
    }

    .key-label {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: #333;
        font-size: 18px;
        font-weight: bold;
        pointer-events: none;
    }

    .octave-label {
        text-align: center;
        color: #aaa;
        font-size: 13px;
        margin-top: 6px;
    }
</style>
</head>
<body>

<div class="piano-container">
    <!-- C4 to C5 + C#6 (13 white keys = C4→C5 + one more C) -->
    <div class="key" data-note="C4"><div class="key-label">C</div><div class="octave-label">4</div></div>
    <div class="key" data-note="D4"><div class="key-label">D</div></div>
    <div class="key" data-note="E4"><div class="key-label">E</div></div>
    <div class="key" data-note="F4"><div class="key-label">F</div></div>
    <div class="key" data-note="G4"><div class="key-label">G</div></div>
    <div class="key" data-note="A4"><div class="key-label">A</div></div>
    <div class="key" data-note="B4"><div class="key-label">B</div></div>
    <div class="key" data-note="C5"><div class="key-label">C</div><div class="octave-label">5</div></div>
    <div class="key" data-note="D5"><div class="key-label">D</div></div>
    <div class="key" data-note="E5"><div class="key-label">E</div></div>
    <div class="key" data-note="F5"><div class="key-label">F</div></div>
    <div class="key" data-note="G5"><div class="key-label">G</div></div>
    <div class="key" data-note="A5"><div class="key-label">A</div></div>
</div>

<script>
// Very simple waveforms + gain envelope
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const noteFrequencies = {
    "C4":  261.63,
    "D4":  293.66,
    "E4":  329.63,
    "F4":  349.23,
    "G4":  392.00,
    "A4":  440.00,
    "B4":  493.88,
    "C5":  523.25,
    "D5":  587.33,
    "E5":  659.25,
    "F5":  698.46,
    "G5":  783.99,
    "A5":  880.00,
};

function playNote(freq) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";          // you can try: "square", "sine", "triangle"
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

    gain.gain.setValueAtTime(0.0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    
    // Very basic envelope release
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);

    osc.stop(audioCtx.currentTime + 2);
}

function playKey(keyElement) {
    const note = keyElement.dataset.note;
    const freq = noteFrequencies[note];
    if (freq) {
        playNote(freq);
        keyElement.classList.add("pressed");
        setTimeout(() => keyElement.classList.remove("pressed"), 180);
    }
}

// Mouse / touch interaction
document.querySelectorAll(".key").forEach(key => {
    function press(e) {
        e.preventDefault();
        playKey(key);
    }

    key.addEventListener("mousedown", press);
    key.addEventListener("touchstart", press);
});

// Optional: keyboard support (A S D F G H J → C4 to B4, then K L ; ' → C5 to A5)
const keyMap = {
    "a": "C4", "s": "D4", "d": "E4", "f": "F4",
    "g": "G4", "h": "A4", "j": "B4",
    "k": "C5", "l": "D5", ";": "E5", "'": "F5",
    "y": "G5", "u": "A5"
};

window.addEventListener("keydown", e => {
    if (e.repeat) return;
    const note = keyMap[e.key.toLowerCase()];
    if (note) {
        const keyEl = document.querySelector(`[data-note="${note}"]`);
        if (keyEl) playKey(keyEl);
    }
});

</script>

</body>
</html>
